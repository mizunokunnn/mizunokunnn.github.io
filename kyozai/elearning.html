<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>情報Ⅰ・Ⅱ eラーニング — 水野の教材ラボ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0e1a">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0e1a'/%3E%3Ctext x='32' y='44' font-size='30' text-anchor='middle' fill='%2360a5fa'%3E%F0%9F%8E%93%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --card:rgba(255,255,255,.05); --border:rgba(255,255,255,.1);
  --text:#e8ecf4; --sub:#8a94ab;
  --blue:#60a5fa; --green:#34d399; --amber:#fbbf24; --rose:#fb7185; --violet:#a78bfa; --cyan:#22d3ee;
  --mono:'JetBrains Mono',Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:
    radial-gradient(ellipse 60% 40% at 15% -10%, rgba(96,165,250,.13), transparent 60%),
    radial-gradient(ellipse 50% 40% at 95% 0%, rgba(34,211,238,.09), transparent 60%),
    var(--bg);
  color:var(--text); font-family:'Noto Sans JP',sans-serif; line-height:1.8;
  min-height:100vh; padding:20px 16px 70px;
}
.wrap{max-width:780px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px}
.back{color:var(--sub);text-decoration:none;font-size:.85rem;font-weight:600;white-space:nowrap}
.back:hover{color:var(--text)}
h1{font-size:clamp(1.25rem,4.5vw,1.65rem);font-weight:900;text-align:center;margin-bottom:6px}
h1 .g{background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
.lead{text-align:center;color:var(--sub);font-size:.85rem;margin-bottom:26px}
.box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 22px;margin-bottom:18px;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ===== コースカード ===== */
.course-head{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.course-badge{
  flex:0 0 auto;font-family:var(--mono);font-weight:800;font-size:.85rem;
  padding:5px 14px;border-radius:999px;color:#0a0e1a;
}
.badge-i1{background:var(--blue)} .badge-i2{background:var(--violet)}
.course-head h2{font-size:1.15rem;font-weight:900}
.course-sub{font-size:.8rem;color:var(--sub);margin-bottom:16px}
.pbar{height:8px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:6px}
.pbar i{display:block;height:100%;border-radius:4px;transition:width .5s}
.pbar-i1 i{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.pbar-i2 i{background:linear-gradient(90deg,var(--violet),var(--rose))}
.ptext{font-size:.75rem;color:var(--sub);font-family:var(--mono);margin-bottom:16px}

/* ===== 単元アコーディオン ===== */
.unit{border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;background:rgba(255,255,255,.02)}
.unit-h{
  width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;
  background:transparent;border:none;color:var(--text);font-family:inherit;text-align:left;
}
.unit-h .no{
  flex:0 0 32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:800;font-size:.85rem;
  background:rgba(255,255,255,.07);color:var(--sub);
}
.unit-h .nm{flex:1;font-weight:700;font-size:.92rem}
.unit-h .st{font-size:.72rem;color:var(--sub);font-family:var(--mono);white-space:nowrap}
.unit-h .caret{color:var(--sub);transition:transform .25s;font-size:.7rem}
.unit.open .caret{transform:rotate(90deg)}
.unit-body{display:none;border-top:1px solid var(--border)}
.unit.open .unit-body{display:block}
.lesson-link{
  display:flex;align-items:center;gap:12px;padding:12px 16px 12px 22px;
  text-decoration:none;color:var(--text);font-size:.88rem;transition:background .15s;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.lesson-link:last-child{border-bottom:none}
.lesson-link:hover{background:rgba(255,255,255,.05)}
.lesson-link .mark{flex:0 0 22px;height:22px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#0a0e1a}
.lesson-link.done .mark{background:var(--green);border-color:var(--green)}
.lesson-link .ttl{flex:1}
.lesson-link .sc{font-size:.7rem;color:var(--sub);font-family:var(--mono)}

.reset-row{text-align:center;margin-top:8px}
.reset-btn{
  background:transparent;border:1px solid var(--border);color:var(--sub);
  padding:8px 18px;border-radius:10px;font-size:.75rem;font-family:inherit;cursor:pointer;
}
.reset-btn:hover{color:var(--rose);border-color:var(--rose)}

/* ===== レッスン画面 ===== */
.crumb{font-size:.75rem;color:var(--sub);margin-bottom:14px}
.crumb a{color:var(--blue);text-decoration:none}
.l-title{font-size:1.3rem;font-weight:900;margin-bottom:20px;line-height:1.5}
.sec{margin-bottom:24px}
.sec h3{
  font-size:.98rem;font-weight:800;margin-bottom:8px;color:var(--cyan);
  display:flex;align-items:center;gap:8px;
}
.sec h3::before{content:"■";font-size:.6rem}
.sec p{font-size:.9rem;color:#c6cede;margin-bottom:8px}
.sec b{color:var(--amber)}
.sec code{
  font-family:var(--mono);font-size:.82em;background:rgba(0,0,0,.4);
  border:1px solid var(--border);border-radius:6px;padding:2px 7px;color:var(--green);
}
.sec table{
  border-collapse:collapse;margin:10px 0;font-size:.8rem;width:100%;
}
.sec th,.sec td{border:1px solid var(--border);padding:6px 10px;text-align:left;color:#c6cede}
.sec th{color:var(--cyan);background:rgba(34,211,238,.06);font-weight:700;white-space:nowrap}
.sec td b{color:var(--amber)}
.sec .tbl-scroll{overflow-x:auto}
.sec ul{margin:6px 0 8px 22px;font-size:.9rem;color:#c6cede}
.sec li{margin-bottom:4px}
.keybox{
  background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.25);
  border-radius:12px;padding:12px 16px;font-size:.85rem;margin-top:6px;
}
.keybox::before{content:"🔑 ここがポイント";display:block;font-weight:800;font-size:.75rem;color:var(--blue);margin-bottom:4px}
.keybox b{color:var(--amber)}

/* 例題ボックス */
.exbox{
  border:1px solid rgba(52,211,153,.3);border-radius:14px;margin:18px 0;overflow:hidden;
}
.exbox .ex-q{background:rgba(52,211,153,.08);padding:12px 16px;font-size:.88rem}
.exbox .ex-q::before{content:"📝 例題";display:block;font-weight:800;font-size:.75rem;color:var(--green);margin-bottom:4px}
.exbox .ex-toggle{
  width:100%;background:transparent;border:none;border-top:1px solid rgba(52,211,153,.3);
  color:var(--green);font-weight:700;font-size:.8rem;padding:10px;cursor:pointer;font-family:inherit;
}
.exbox .ex-s{display:none;padding:12px 16px;font-size:.85rem;color:#c6cede;border-top:1px solid rgba(52,211,153,.2)}
.exbox.open .ex-s{display:block}
.exbox b{color:var(--amber)}
.exbox code{font-family:var(--mono);font-size:.82em;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:6px;padding:2px 7px;color:var(--green)}

/* 理解度チェック */
.check-h{font-size:1rem;font-weight:900;margin:26px 0 4px;color:var(--amber)}
.check-sub{font-size:.78rem;color:var(--sub);margin-bottom:16px}
.cq{margin-bottom:20px}
.cq .qt{font-size:.92rem;font-weight:700;margin-bottom:10px}
.cq .qt .qno{color:var(--amber);font-family:var(--mono);margin-right:6px}
.cq .qt code{font-family:var(--mono);font-size:.82em;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:6px;padding:2px 7px;color:var(--green);font-weight:400}
.opts{display:grid;gap:9px}
.opt{
  padding:12px 15px;border-radius:12px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);cursor:pointer;text-align:left;
  font-size:.87rem;color:var(--text);font-family:inherit;transition:all .15s;
  display:flex;gap:10px;align-items:center;
}
.opt .k{flex:0 0 24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.07);font-family:var(--mono);font-weight:800;font-size:.72rem;color:var(--sub)}
.opt:not(:disabled):hover{border-color:var(--blue);background:rgba(96,165,250,.08)}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--green);background:rgba(52,211,153,.13);color:var(--green);font-weight:700}
.opt.wrong{border-color:var(--rose);background:rgba(251,113,133,.12);color:var(--rose)}
.opt.dim{opacity:.4}
.cq .exp{display:none;margin-top:8px;font-size:.78rem;color:var(--sub);background:rgba(0,0,0,.25);border-radius:10px;padding:10px 14px}
.cq .exp.show{display:block}

.verdict{margin-top:20px;text-align:center;font-weight:900;font-size:1.05rem;min-height:2em}
.verdict .pass{color:var(--green)} .verdict .fail{color:var(--rose)}
.nav-row{display:flex;gap:10px;margin-top:18px}
.nbtn{
  flex:1;padding:13px;border-radius:12px;border:1px solid var(--border);cursor:pointer;
  font-weight:800;font-size:.9rem;font-family:inherit;background:var(--card);color:var(--text);
  text-align:center;text-decoration:none;transition:transform .15s;
}
.nbtn:active{transform:scale(.97)}
.nbtn.primary{color:#0a0e1a;background:linear-gradient(90deg,var(--blue),var(--cyan));border:none}
footer{text-align:center;margin-top:30px;font-size:.75rem;color:var(--sub)}
footer a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="../index.html">← 教材ラボへ戻る</a>
    <span style="font-size:.75rem;color:var(--sub)">情報Ⅰ・Ⅱ</span>
  </div>
  <div id="app"></div>
  <footer><a href="../index.html">水野の教材ラボ</a> — 情報Ⅰ・Ⅱ eラーニング（進捗はこの端末に保存されます）</footer>
</div>

<script>
'use strict';
/* =========================================================
   コンテンツデータ
   secs: 解説 / ex: 例題(解答は開閉式) / key: まとめ /
   quiz: 理解度チェック(正解は常に先頭で定義し表示時シャッフル)
========================================================= */
const COURSES = [
{ id:'i1', name:'情報Ⅰ', badge:'badge-i1', pbar:'pbar-i1',
  desc:'共通テスト対応。全4単元19レッスン。各レッスンは教科書レベルの解説＋例題＋演習5問で構成。',
  units:[
/* ================================================================
   情報Ⅰ 第1単元 情報社会の問題解決
================================================================ */
{ name:'情報社会の問題解決', lessons:[

{ title:'情報の特性とメディア',
  secs:[
    { h:'データ・情報・知識の違い', p:'<b>データ</b>は事実や出来事の記録そのもの（例：「気温32℃」）。データを目的に応じて整理し、意味づけしたものが<b>情報</b>（例：「今日は真夏日だ」）。情報を分析・一般化して問題解決に使える形にしたものが<b>知識</b>（例：「真夏日は熱中症対策が必要だ」）。この階層は<b>DIKWモデル</b>（Data→Information→Knowledge→Wisdom）と呼ばれる。試験では「これはデータか情報か」を判別させる問題が出る。' },
    { h:'情報の4つの特性', p:'モノ（物質）と比べたとき、情報には次の特性がある。<div class="tbl-scroll"><table><tr><th>特性</th><th>意味</th><th>具体例・注意点</th></tr><tr><td><b>残存性</b></td><td>人に伝えても自分の手元から消えない</td><td>秘密を教えても自分は忘れない。流出情報は回収不能</td></tr><tr><td><b>複製性</b></td><td>容易にコピーでき、劣化しない</td><td>違法コピーが問題になる根本原因</td></tr><tr><td><b>伝播性</b></td><td>短時間で広範囲に伝わる</td><td>SNSでの拡散・炎上。デマも一瞬で広がる</td></tr><tr><td>形がない<br>（無形性）</td><td>物質ではないため形で確認できない</td><td>盗まれても気づきにくい</td></tr></table></div>' },
    { h:'メディアの3分類', p:'メディア＝情報を伝える仲立ちをするもの。役割で3つに分類できる。<ul><li><b>表現のためのメディア</b>：文字・音声・静止画・動画など</li><li><b>伝達のためのメディア</b>：電話・郵便・インターネット・テレビ放送など</li><li><b>記録のためのメディア</b>：紙・USBメモリ・SSD・光ディスクなど</li></ul>また、新聞・テレビのように少数の発信者から多数へ一方向に伝える<b>マスメディア</b>と、誰もが発信者になれる双方向の<b>インターネットメディア</b>では、「情報の信頼性を担保する仕組み（編集・校閲）があるかどうか」が大きく異なる。' },
    { h:'情報社会の影：偏る情報環境', p:'インターネットでは自分に都合のよい情報だけに囲まれる危険がある。<ul><li><b>フィルターバブル</b>：検索エンジンやSNSの<b>アルゴリズム</b>が、その人の好みに合う情報ばかり表示し、泡（バブル）に包まれたように視野が狭くなる現象</li><li><b>エコーチェンバー</b>：SNSで同じ意見の人ばかりとつながり、自分の意見が反響（エコー）して増幅され、それが世の中の多数派だと錯覚する現象</li><li><b>フェイクニュース</b>：虚偽の情報をニュースのように装ったもの。真偽を確認する活動を<b>ファクトチェック</b>という</li></ul>' },
    { h:'メディアリテラシー', p:'メディアの特性を理解し、情報を<b>主体的に読み解き・活用し・発信する能力</b>をメディアリテラシーという。実践の基本は、①発信者は誰か・目的は何かを考える、②<b>一次情報</b>（当事者・発生源からの直接の情報）にあたる、③<b>クロスチェック</b>（複数の独立した情報源で照合する）、④発信日時を確認する（古い情報の再拡散が多い）。' },
  ],
  ex:[
    { q:'災害発生直後、SNSで「動物園からライオンが逃げた」という画像つき投稿が拡散されている。あなたが取るべき行動として適切なものを考えよ。',
      s:'<b>拡散しない</b>のが第一。①発信者は当事者（動物園・自治体・警察）か？　②画像は本当に今回のものか（過去画像の転用が典型的な手口）　③動物園や自治体の公式発表（一次情報）を確認する。実際に熊本地震（2016年）でこの内容のデマが拡散され、投稿者が偽計業務妨害の疑いで逮捕された。<b>善意のシェアもデマ拡散に加担する</b>ことを覚えておく。' },
  ],
  key:'情報の特性は<b>残存性・複製性・伝播性</b>の3点セットで暗記。フィルターバブル（アルゴリズムが原因）とエコーチェンバー（人のつながりが原因）の区別は頻出。',
  quiz:[
    { q:'「1組の数学の平均点は65点だった」という記述を先生が成績分析に役立てた。DIKWモデルで「各生徒の点数の一覧表」にあたるものは？', o:['データ','情報','知識','知恵'], e:'加工前の記録そのものはデータ。平均点という意味づけをしたものが情報。' },
    { q:'情報の「残存性」の説明として最も適切なものは？', o:['他人に伝えても自分の手元からなくならない','コピーしても品質が落ちない','短時間で広範囲に伝わる','物質のような形をもたない'], e:'残存性＝伝えても残る。複製性・伝播性としっかり区別すること。' },
    { q:'フィルターバブルの説明として正しいものは？', o:['アルゴリズムが利用者の好みに合う情報ばかりを表示し、視野が狭くなる現象','同じ意見の人同士がつながり意見が増幅される現象','偽の情報がニュースの形で拡散される現象','大量のデータが泡のように消える現象'], e:'フィルターバブルの主語は「アルゴリズム」。人間関係の中で増幅されるのはエコーチェンバー。' },
    { q:'情報の信ぴょう性を確かめる方法として最も適切なものは？', o:['独立した複数の情報源と一次情報で内容を照合する','フォロワー数が多い人の投稿を信じる','拡散回数が多い情報を信じる','画像つきの投稿を信じる'], e:'人気・拡散数・画像の有無は信頼性の根拠にならない。クロスチェックと一次情報の確認が基本。' },
    { q:'マスメディアと比較したインターネットメディアの特徴は？', o:['誰もが発信者になれるため、信頼性を編集・校閲で担保する仕組みが働きにくい','情報の伝わる速度が必ず遅い','双方向のやり取りができない','発信に国家資格が必要である'], e:'発信の自由と信頼性の担保はトレードオフ。だから受信者側のメディアリテラシーが重要になる。' },
  ]},

{ title:'問題解決の手法',
  secs:[
    { h:'問題とは何か', p:'問題＝<b>理想（あるべき姿）と現実のギャップ</b>。「部活の新入部員が少ない」なら、理想（20人ほしい）と現実（5人）の差の15人分が問題。最初にすべきは<b>問題の明確化</b>で、5W1H（いつ・どこで・誰が・何を・なぜ・どのように）や数値を使って具体的に言語化する。' },
    { h:'問題解決のプロセスとPDCA', p:'基本の流れは「<b>①問題の明確化 → ②情報の収集・整理・分析 → ③解決策の立案・選択 → ④実行 → ⑤評価・改善・共有</b>」。1回で終わらせず、<b>PDCAサイクル</b>（Plan計画→Do実行→Check評価→Action改善）を回して継続的に改善する。評価のときは、実行前に決めておいた<b>評価基準</b>と照らし合わせることが重要。' },
    { h:'発想の手法', p:'<ul><li><b>ブレーンストーミング</b>：集団でアイデアを出す手法。4原則＝<b>批判禁止</b>（判断は後回し）・<b>自由奔放</b>（突飛な案を歓迎）・<b>質より量</b>・<b>結合便乗</b>（他人の案に乗っかってよい）</li><li><b>KJ法</b>：出たアイデアを1枚1件でカードに書き、似たものを<b>グループ化</b>して見出しをつけ、関係を図解して構造を見いだす整理法</li><li><b>マインドマップ</b>：中心テーマから放射状に連想を広げる発想法</li></ul>' },
    { h:'整理・比較・意思決定の道具', p:'<ul><li><b>ロジックツリー（樹形図）</b>：問題を「なぜ？」「どうやって？」で枝分かれさせ、原因や手段をもれなく洗い出す</li><li><b>マトリクス（比較表）</b>：候補×評価項目の表で比較。項目に重要度の<b>重みづけ</b>をして点数の合計で決める方法が客観的</li><li><b>座標軸</b>：「効果×コスト」のような2軸に配置して優先順位を見つける</li></ul>選択肢の間には多くの場合<b>トレードオフ</b>（一方を追求すると他方が犠牲になる関係。例：品質とコスト）があるため、何を優先するかの基準を先に決める。' },
    { h:'計画の管理と合意形成', p:'作業計画は<b>ガントチャート</b>（縦に作業項目、横に期間をとり、帯で表す工程表）で見える化する。集団の意思決定では多数決が手軽だが、<b>少数意見が反映されない</b>限界がある。十分に議論して全員が納得できる案を探る<b>合意形成（コンセンサス）</b>の姿勢が大切。' },
  ],
  ex:[
    { q:'文化祭の出し物を「お化け屋敷」「縁日」「映像上映」から選ぶ。評価項目を楽しさ（重み3）・実現しやすさ（重み2）・費用の安さ（重み1）とし、各項目を3点満点で採点したら、お化け屋敷（3,1,1）、縁日（2,3,3）、映像上映（1,3,3）だった。重みづけ評価で選ばれるのはどれか。',
      s:'重み×点数の合計を計算する。<br>お化け屋敷：3×3＋1×2＋1×1＝<b>12点</b><br>縁日：2×3＋3×2＋3×1＝<b>15点</b><br>映像上映：1×3＋3×2＋3×1＝<b>12点</b><br>よって<b>縁日</b>。重みづけ評価は「どの項目を重視するか」を先に合意しておけるのが利点。' },
  ],
  key:'問題＝理想－現実。ブレスト4原則（<b>批判禁止・自由奔放・質より量・結合便乗</b>）とKJ法（カード→グループ化→図解）は名前と手順をセットで覚える。',
  quiz:[
    { q:'「問題」の定義として最も適切なものは？', o:['理想の状態と現実の状態のギャップ','困っている気持ち','他人から与えられた課題','失敗した経験'], e:'理想と現実の差を具体的に言語化することが問題解決のスタート。' },
    { q:'ブレーンストーミングで適切な行動は？', o:['他人のアイデアに便乗して新しい案を出す','非現実的な案をその場で却下する','質の高い案だけを厳選して発言する','リーダーの案への賛否を多数決で決めながら進める'], e:'結合便乗は4原則のひとつ。批判・選別は発想の段階ではしない。' },
    { q:'KJ法の手順として正しいものは？', o:['アイデアをカードに書き、似たものをグループ化し、構造を図解する','アイデアを時系列に並べて年表を作る','アイデアを多数決でひとつに絞る','中心テーマから放射状に連想を広げる'], e:'放射状に広げるのはマインドマップ。KJ法は「グループ化」がキーワード。' },
    { q:'「画質を上げると通信量が増える」のような関係を何という？', o:['トレードオフ','フィードバック','シナジー','ボトルネック'], e:'一方を立てれば他方が立たない関係。優先順位の基準を先に決めて対処する。' },
    { q:'ガントチャートの説明として正しいものは？', o:['作業項目と期間を帯状に表して進行を管理する図','データの分布を長方形で表した図','原因と結果を魚の骨の形に整理した図','項目間の割合を扇形で表した図'], e:'工程管理の定番。ヒストグラム（分布）や円グラフ（割合）と混同しない。' },
  ]},

{ title:'知的財産権と個人情報',
  secs:[
    { h:'知的財産権の全体像', p:'人間の知的な創作活動の成果を守る権利の総称が<b>知的財産権</b>。大きく<b>著作権</b>（文化的な創作物）と<b>産業財産権</b>（産業に関わるもの、特許庁に<b>出願・登録して初めて発生</b>）に分かれる。<div class="tbl-scroll"><table><tr><th>権利</th><th>保護対象</th><th>保護期間</th></tr><tr><td><b>特許権</b></td><td>発明（高度な技術的アイデア）</td><td>出願から20年</td></tr><tr><td><b>実用新案権</b></td><td>考案（物の形状・構造の工夫）</td><td>出願から10年</td></tr><tr><td><b>意匠権</b></td><td>デザイン（物の形・模様・色彩）</td><td>出願から25年</td></tr><tr><td><b>商標権</b></td><td>商品・サービスのマークや名称</td><td>登録から10年（<b>更新で半永久</b>）</td></tr></table></div>' },
    { h:'著作権のしくみ', p:'著作物＝<b>思想または感情を創作的に表現したもの</b>（小説・音楽・絵画・写真・プログラムなど。単なるデータやアイデア自体は含まない）。著作権は創作した瞬間に<b>自動的に発生</b>し、登録は不要（<b>無方式主義</b>）。保護期間は原則<b>著作者の死後70年</b>。中身は2つに分かれる。<ul><li><b>著作者人格権</b>：公表権・氏名表示権・<b>同一性保持権</b>（勝手に改変されない権利）。人格と結びつくため<b>譲渡できない</b></li><li><b>著作権（財産権）</b>：複製権・<b>公衆送信権</b>（ネットにアップロードする権利）・上演権など。<b>譲渡・相続できる</b></li></ul>さらに、実演家・レコード製作者・放送事業者など「伝える人」を守る<b>著作隣接権</b>もある。' },
    { h:'許諾なしで利用できる例外', p:'著作物の利用は原則許諾が必要だが、例外がある。<ul><li><b>私的使用のための複製</b>：個人・家庭内で使うためのコピー。ただし<b>コピーガードの解除</b>や、違法アップロードと知りながらの<b>ダウンロード</b>は私的使用でも違法</li><li><b>引用</b>：4要件＝①公表された著作物であること、②かぎ括弧などで<b>本文と明瞭に区別</b>、③自分の文章が<b>主</b>で引用が<b>従</b>、④<b>出所の明示</b>。要件を満たせば許諾不要</li><li><b>学校での複製</b>：授業で使う目的なら必要な限度で複製できる（教員・児童生徒。ただし市販ドリルの丸ごとコピーなど権利者の利益を不当に害する場合は不可）</li></ul>' },
    { h:'クリエイティブ・コモンズ（CC）ライセンス', p:'著作者が「この条件なら自由に使ってよい」と意思表示する国際的な仕組み。4つの条件を組み合わせる。<ul><li><b>BY（表示）</b>：作者のクレジットを表示すること（全ライセンス共通）</li><li><b>NC（非営利）</b>：営利目的で使わないこと</li><li><b>ND（改変禁止）</b>：改変しないこと</li><li><b>SA（継承）</b>：改変した作品にも同じライセンスを付けること</li></ul>例：「CC BY-NC」＝クレジットを表示すれば非営利に限り改変・再配布できる。' },
    { h:'個人情報とプライバシー', p:'<b>個人情報</b>＝生存する個人を識別できる情報。氏名・住所のほか、他の情報と組み合わせて特定できるものも含む。マイナンバーや指紋・顔認証データなどは<b>個人識別符号</b>としてそれ単体で個人情報になる。人種・信条・病歴・犯罪歴などは<b>要配慮個人情報</b>と呼ばれ、取得に<b>本人の同意が必要</b>。個人情報保護法により、事業者は利用目的の特定・通知、安全管理、本人の同意なき第三者提供の禁止などが義務づけられる。関連して、<b>プライバシー権</b>（私生活をみだりに公開されない権利）、<b>肖像権</b>（容姿を無断で撮影・公表されない権利）、<b>パブリシティ権</b>（有名人の名前や肖像がもつ経済的価値を独占する権利）、検索結果からの削除を求める「<b>忘れられる権利</b>」も押さえておく。' },
  ],
  ex:[
    { q:'レポートに他人のブログ記事の一部を使いたい。適法な「引用」にするために必要なことを挙げよ。',
      s:'①その記事が<b>公表されたもの</b>であることを確認する。②引用部分をかぎ括弧や字下げで<b>自分の文章と明瞭に区別</b>する。③あくまで自分の論述が主役で、引用は補強材料（<b>主従関係</b>）。④筆者名・記事タイトル・URL・閲覧日など<b>出所を明示</b>する。この4要件を満たせば<b>許諾は不要</b>。「許諾を取ること」は引用の要件ではない点がよく出題される。' },
  ],
  key:'著作権は<b>無方式主義</b>（自動発生）、産業財産権は<b>登録が必要</b>。譲渡できないのは<b>著作者人格権</b>。更新で半永久に守れるのは<b>商標権</b>だけ。',
  quiz:[
    { q:'他人に譲渡することができない権利は？', o:['著作者人格権','複製権','公衆送信権','特許権'], e:'人格権（公表権・氏名表示権・同一性保持権）は著作者本人だけのもの。財産権としての著作権は譲渡できる。' },
    { q:'産業財産権のうち、更新により半永久的に保護を続けられるものは？', o:['商標権','特許権','意匠権','実用新案権'], e:'商標はブランドを守るものなので10年ごとの更新で継続できる。特許20年・実用新案10年・意匠25年。' },
    { q:'適法な引用の要件に含まれないものは？', o:['著作者から事前に許諾を得ること','引用部分を明瞭に区別すること','自分の文章が主で引用が従であること','出所を明示すること'], e:'要件を満たした引用に許諾は不要。これが引用という制度の存在意義。' },
    { q:'「CC BY-ND」のライセンスで許されることは？', o:['クレジットを表示したうえで、改変せずにそのまま配布する','自由に改変して配布する','クレジットなしで配布する','改変して別のライセンスを付ける'], e:'BY＝表示が必要、ND＝改変禁止。原形のままならクレジット付きで再配布できる。' },
    { q:'要配慮個人情報にあたるものは？', o:['病歴','氏名','電話番号','生年月日'], e:'病歴・人種・信条・犯罪歴などは差別につながるおそれがあるため、取得に本人同意が必要。' },
  ]},

{ title:'情報セキュリティと情報モラル',
  secs:[
    { h:'情報セキュリティの3要素（CIA）', p:'<div class="tbl-scroll"><table><tr><th>要素</th><th>意味</th><th>対策の例</th></tr><tr><td><b>機密性</b><br>Confidentiality</td><td>許可された人だけがアクセスできる</td><td>パスワード、アクセス制御、暗号化</td></tr><tr><td><b>完全性</b><br>Integrity</td><td>情報が正確で改ざんされていない</td><td>デジタル署名、変更履歴</td></tr><tr><td><b>可用性</b><br>Availability</td><td>必要なときに使える</td><td>バックアップ、システムの二重化</td></tr></table></div>「サーバがダウンして使えない」は可用性、「成績データが書き換えられた」は完全性、「パスワードが漏れた」は機密性の侵害。' },
    { h:'マルウェアの種類', p:'悪意あるソフトウェアの総称が<b>マルウェア</b>。<ul><li><b>ウイルス</b>：他のファイルに寄生して感染を広げる</li><li><b>ワーム</b>：宿主なしで<b>単独で自己増殖</b>し、ネットワーク経由で広がる</li><li><b>トロイの木馬</b>：便利なソフトを装って侵入し、裏で悪事を働く（自己増殖しない）</li><li><b>ランサムウェア</b>：データを勝手に<b>暗号化して人質</b>にし、身代金（ランサム）を要求する</li><li><b>スパイウェア</b>：利用者の情報をこっそり外部に送信する</li></ul>' },
    { h:'人をだます攻撃', p:'<ul><li><b>フィッシング</b>：実在の企業を装ったメールやSMSで偽サイトへ誘導し、ID・パスワード・クレジットカード情報を入力させる</li><li><b>標的型攻撃</b>：特定の組織を狙い、業務メールを装った添付ファイルなどでマルウェアを送り込む</li><li><b>ソーシャルエンジニアリング</b>：技術を使わず人間の心理の隙をつく。肩越しにパスワードを盗み見る<b>ショルダーハック</b>、管理者になりすます電話、ゴミ箱の書類をあさる<b>トラッシング</b>など</li></ul>' },
    { h:'認証と対策', p:'本人確認（認証）の3要素は<b>知識</b>（パスワード・暗証番号）・<b>所持</b>（ICカード・スマホ）・<b>生体</b>（指紋・顔・虹彩）。異なる要素を2つ以上組み合わせるのが<b>多要素認証</b>で、同じ要素を2つ（パスワード2個など）では多要素にならない。生体認証には、他人を誤って受け入れる率（<b>他人受入率</b>）と本人を誤って拒否する率（<b>本人拒否率</b>）があり、一方を厳しくすると他方が悪化する<b>トレードオフ</b>の関係にある。日常の対策は、①パスワードは長く・使い回さない、②OSやアプリを<b>更新</b>して脆弱性（セキュリティホール）をふさぐ、③ウイルス対策ソフトの定義ファイルを最新に保つ、④重要データの<b>バックアップ</b>、⑤怪しいリンク・添付ファイルを開かない。' },
    { h:'セキュリティ関連の法律と情報モラル', p:'<ul><li><b>不正アクセス禁止法</b>：他人のID・パスワードで無断ログインする行為（なりすまし）、セキュリティホールを突く侵入、他人のパスワードを第三者に教える<b>助長行為</b>も処罰対象</li><li><b>ウイルス作成罪</b>（刑法）：正当な理由なくマルウェアを作成・提供・保管する行為</li></ul>また、一度ネットに出た情報は完全には消せず（<b>デジタルタトゥー</b>）、軽率な投稿が<b>炎上</b>や進学・就職への影響を招く。発信前に「世界中に公開されてよい内容か」を考える習慣が最大の防御になる。' },
  ],
  ex:[
    { q:'「お荷物のお届けに伺いましたが不在のため持ち帰りました。下記よりご確認ください」というSMSが届き、URLが添えられていた。どう対応すべきか。',
      s:'典型的な<b>フィッシング（スミッシング＝SMS版フィッシング）</b>。①<b>URLは開かない</b>。②荷物に心当たりがあっても、SMSのリンクではなく<b>公式アプリや公式サイトを自分で開いて</b>追跡番号を確認する。③開いてしまいID等を入力した場合は、すぐにパスワード変更とカード会社への連絡を。「あわてさせて確認させない」のが攻撃者の狙いなので、一呼吸おくことが対策になる。' },
  ],
  key:'CIA＝<b>機密性・完全性・可用性</b>を事例と対応づけられるように。ワーム（単独増殖）とウイルス（寄生）とトロイの木馬（偽装・増殖しない）の区別は頻出。',
  quiz:[
    { q:'サーバが攻撃を受けて停止し、サービスが利用できなくなった。損なわれたのはCIAのどれか？', o:['可用性','機密性','完全性','真正性'], e:'「使いたいときに使えない」＝可用性の侵害。DoS攻撃はこれを狙う。' },
    { q:'データを暗号化して復元と引き換えに金銭を要求するマルウェアは？', o:['ランサムウェア','ワーム','スパイウェア','トロイの木馬'], e:'ランサム＝身代金。対策の柱は日頃のバックアップ。' },
    { q:'多要素認証として成立する組み合わせは？', o:['パスワードと指紋認証','パスワードと秘密の質問','2種類のパスワード','2種類の秘密の質問'], e:'知識＋生体で2要素。パスワードと秘密の質問はどちらも「知識」なので1要素のまま。' },
    { q:'生体認証で他人受入率を下げるように設定を厳しくすると、一般にどうなるか？', o:['本人拒否率が上がる','本人拒否率も下がる','認証速度が上がる','登録データが不要になる'], e:'他人を通しにくくすると本人もはじかれやすくなるトレードオフの関係。' },
    { q:'不正アクセス禁止法で処罰される行為は？', o:['他人のIDとパスワードを使って無断でログインする','迷惑メールを大量に送信する','ネット上で他人を中傷する','違法な画像を所持する'], e:'なりすましログインや、他人のパスワードを教える助長行為が同法の対象。中傷は名誉毀損等、迷惑メールは特定電子メール法。' },
  ]},
]},

{ name:'コミュニケーションと情報デザイン', lessons:[

{ title:'数値の表現（2進数・16進数・補数）',
  secs:[
    { h:'なぜ2進数か・基数変換の基本', p:'コンピュータは電圧の高低の2状態で動くため、すべての情報を<b>0と1</b>で表す。2進数1桁＝<b>1ビット</b>、8ビット＝<b>1バイト</b>。<b>10進→2進は「2で割った余りを下から読む」</b>、<b>2進→10進は「各桁の重み（…8,4,2,1）を足す」</b>。2進数は桁が長くなるので、<b>4桁をまとめて16進数1桁</b>で表す（0〜9のあとA〜Fを使う。A=10, B=11, C=12, D=13, E=14, F=15）。<div class="tbl-scroll"><table><tr><th>10進</th><td>0</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>10</td><td>11</td><td>12</td><td>13</td><td>14</td><td>15</td></tr><tr><th>2進</th><td>0000</td><td>0001</td><td>0010</td><td>0011</td><td>0100</td><td>0101</td><td>0110</td><td>0111</td><td>1000</td><td>1001</td><td>1010</td><td>1011</td><td>1100</td><td>1101</td><td>1110</td><td>1111</td></tr><tr><th>16進</th><td>0</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>A</td><td>B</td><td>C</td><td>D</td><td>E</td><td>F</td></tr></table></div>' },
    { h:'2進数の小数', p:'小数点以下の重みは <b>0.5（2⁻¹）、0.25（2⁻²）、0.125（2⁻³）…</b>と半分ずつになる。例：<code>0.101(2) = 0.5 + 0.125 = 0.625</code>。10進小数→2進は「<b>2倍して整数部分を取り出す</b>」を繰り返す。重要なのは、10進の0.1のように<b>2進数では無限小数になってしまう数がある</b>こと。これがコンピュータの計算誤差（<b>丸め誤差</b>）の原因になる。' },
    { h:'負の数：2の補数', p:'コンピュータは引き算専用の回路を持たず、負数を<b>2の補数</b>で表して「足し算」で引き算を実現する。2の補数の作り方＝「<b>全ビットを反転して1を足す</b>」。例（4ビット）：3＝0011 → 反転1100 → ＋1＝<b>1101がマイナス3</b>。最上位ビットが1なら負数。nビットで表せる範囲は<b>−2ⁿ⁻¹ 〜 2ⁿ⁻¹−1</b>（8ビットなら−128〜＋127）。' },
    { h:'2進数の加算とオーバーフロー', p:'加算は「1＋1＝10（桁上がり）」に注意して筆算する。表せる範囲を超えると<b>オーバーフロー</b>（あふれ）が起きて正しい結果にならない。補数を使った引き算では、いちばん上からあふれた桁上がりは<b>無視してよい</b>のがルール。' },
    { h:'実数の表現と誤差', p:'小数点の位置を固定する<b>固定小数点数</b>と、<code>±仮数×2^指数</code> の形で表す<b>浮動小数点数</b>（符号部・指数部・仮数部）がある。浮動小数点は広い範囲を表せるが桁数が有限なので、<b>丸め誤差</b>（表しきれず四捨五入等で生じる誤差）や<b>打ち切り誤差</b>（計算を途中でやめることによる誤差）が生じる。「コンピュータの計算は常に厳密」ではないことを覚えておく。' },
  ],
  ex:[
    { q:'10進数の45を2進数と16進数で表せ。',
      s:'2で割って余りを並べる：45÷2=22…<b>1</b>、22÷2=11…<b>0</b>、11÷2=5…<b>1</b>、5÷2=2…<b>1</b>、2÷2=1…<b>0</b>、1÷2=0…<b>1</b>。下から読んで <b>101101(2)</b>。<br>16進へは4桁区切り：<code>0010 | 1101</code> → 2とD → <b>2D(16)</b>。<br>検算：32+8+4+1=45 ✓' },
    { q:'4ビットの2の補数表現を使って 6−3 を加算で計算せよ。',
      s:'6＝<code>0110</code>。−3は「3＝0011を反転→1100、＋1→<code>1101</code>」。<br>加算：<code>0110 + 1101 = 10011</code>。5桁目のあふれ（桁上がり）は<b>無視</b>して <code>0011</code>＝<b>3</b>。正しく 6−3＝3 が求まった。' },
  ],
  key:'2の補数＝<b>反転して＋1</b>。nビットの範囲は<b>−2ⁿ⁻¹〜2ⁿ⁻¹−1</b>（マイナス側が1つ多い）。2進4桁＝16進1桁の対応表は書けるように。',
  quiz:[
    { q:'2進数 110101 を10進数で表すと？', o:['53','43','49','57'], e:'32+16+4+1=53。重み（32,16,8,4,2,1）のうち1が立つ桁を足す。' },
    { q:'10進数の 0.625 を2進数で表すと？', o:['0.101','0.110','0.011','0.625'], e:'0.625=0.5+0.125=2⁻¹+2⁻³ なので 0.101。2倍法でも確認できる（0.625→1.25→0.5→1.0）。' },
    { q:'8ビットの2の補数表現で表せる整数の範囲は？', o:['−128〜＋127','−127〜＋128','−255〜＋255','0〜255'], e:'−2⁷〜2⁷−1。0を非負側に含むため、マイナス側が1つ広い。' },
    { q:'4ビットの2の補数表現で −6 を表すと？', o:['1010','0110','1001','1110'], e:'6=0110 → 反転1001 → ＋1で1010。検算：1010+0110=10000→下位4桁0000=0 ✓' },
    { q:'16進数 A5 を10進数で表すと？', o:['165','105','1605','95'], e:'A=10なので 10×16+5=165。' },
  ]},

{ title:'情報量と文字のデジタル化',
  secs:[
    { h:'情報量：nビットで2ⁿ通り', p:'1ビットで2通り、2ビットで4通り、<b>nビットで2ⁿ通り</b>を区別できる。逆に「M通りを区別するのに必要な最小ビット数」は<b>2ⁿ≧Mとなる最小のn</b>。例：26文字のアルファベットなら2⁴=16では足りず2⁵=32≧26なので<b>5ビット</b>。この「何通り⇔何ビット」の往復は共通テスト最頻出の計算。' },
    { h:'データ量の単位', p:'<div class="tbl-scroll"><table><tr><th>単位</th><th>大きさ</th></tr><tr><td>1バイト（B）</td><td>8ビット（2⁸=256通り）</td></tr><tr><td>1kB（キロ）</td><td>10³=1,000バイト</td></tr><tr><td>1MB（メガ）</td><td>10⁶バイト＝1,000kB</td></tr><tr><td>1GB（ギガ）</td><td>10⁹バイト＝1,000MB</td></tr><tr><td>1TB（テラ）</td><td>10¹²バイト＝1,000GB</td></tr></table></div>ビット（b）とバイト（B）の混同に注意。<b>バイト＝ビット÷8</b>。なお2¹⁰=1024を単位とする流儀（KiB等）もある。' },
    { h:'文字コードのしくみ', p:'文字を番号（<b>文字コード</b>）に対応させて0と1で表す。<ul><li><b>ASCII</b>：英数字・記号を<b>7ビット</b>（128種類）で表す最も基本的なコード。例：<code>A=65</code>、<code>a=97</code>、A〜Zは連続した番号</li><li><b>JISコード・Shift_JIS・EUC-JP</b>：日本語（漢字・かな）を扱うために作られた規格</li><li><b>Unicode</b>：世界中の文字をひとつの体系で扱う規格。符号化方式の<b>UTF-8</b>は、ASCIIと同じ文字は<b>1バイト</b>、日本語の多くは<b>3バイト</b>で表す（ASCII互換）。現在のWebの標準</li></ul>送り手と受け手が<b>異なる文字コードで解釈</b>すると<b>文字化け</b>が起こる。' },
    { h:'誤り検出：パリティビット', p:'通信や記録ではビットが反転する誤りが起こりうる。データに1ビット追加して<b>1の個数を偶数（偶数パリティ）または奇数（奇数パリティ）にそろえる</b>のがパリティビット。受信側で1の個数を数えれば<b>1ビットの誤りを検出</b>できる。ただし、①<b>どのビットが誤ったかは分からない</b>（訂正はできない）、②<b>2ビット同時の誤りは見逃す</b>、という限界がある。' },
  ],
  ex:[
    { q:'「A」のASCIIコードは10進で65である。「E」のASCIIコードを10進と2進（7桁）で表せ。',
      s:'A〜Zは連続番号なので E は A の4つ後：65＋4＝<b>69</b>。<br>2進へ：69＝64＋4＋1＝<b>1000101(2)</b>。<br>このように「連続性を使って別の文字のコードを求める」問題が定番。' },
    { q:'偶数パリティを使う。7ビットのデータ 1011010 に付加するパリティビットは0か1か。',
      s:'データ中の1の個数を数える：1,0,1,1,0,1,0 → <b>4個（偶数）</b>。すでに偶数なのでパリティビットは<b>0</b>（合計を偶数のまま保つ）。もし1が奇数個ならパリティビットは1にする。' },
  ],
  key:'「M通り⇔nビット」は<b>2ⁿ≧M となる最小のn</b>。UTF-8は<b>ASCII部分1バイト・日本語約3バイト</b>。パリティは<b>検出のみ・訂正不可・2ビット誤りは見逃す</b>。',
  quiz:[
    { q:'100種類の状態を区別するために必要な最小のビット数は？', o:['7ビット','6ビット','8ビット','10ビット'], e:'2⁶=64＜100≦128=2⁷ なので7ビット。' },
    { q:'ASCIIコードが表現に使うビット数は？', o:['7ビット','8ビット','16ビット','32ビット'], e:'7ビットで128文字。英数字と基本記号のみで日本語は表せない。' },
    { q:'UTF-8で「abcあいう」を保存すると何バイトになるか（日本語1文字3バイトとする）？', o:['12バイト','6バイト','18バイト','9バイト'], e:'半角英字3文字×1バイト＋日本語3文字×3バイト＝3＋9＝12バイト。' },
    { q:'偶数パリティで7ビットデータ 1010110 に付加するパリティビットは？', o:['0','1','2','どちらでもよい'], e:'1の個数は4個ですでに偶数。よって0を付けて偶数を保つ。' },
    { q:'パリティビットによる誤り検出の限界として正しいものは？', o:['2ビットが同時に誤ると検出できない','1ビットの誤りも検出できない','誤りの位置まで特定できてしまう','データ量が半分になってしまう'], e:'2ビット反転すると1の個数の偶奇が元に戻るため見逃す。位置特定（訂正）もできない。' },
  ]},

{ title:'音のデジタル化',
  secs:[
    { h:'音の正体とアナログ・デジタル', p:'音は空気の振動が波として伝わったもの。1秒間の振動数が<b>周波数（Hz）</b>で音の高さを、<b>振幅</b>が音の大きさを決める。連続的に変化する<b>アナログ</b>の波を、とびとびの数値＝<b>デジタル</b>に変換すれば、劣化なくコピー・加工・伝送できる。変換は<b>標本化→量子化→符号化</b>の3ステップ（<b>PCM方式</b>）。' },
    { h:'ステップ1：標本化（サンプリング）', p:'波の高さを<b>一定の時間間隔で測定</b>する。1秒あたりの測定回数が<b>標本化周波数（サンプリング周波数、Hz）</b>。<b>標本化定理</b>：元の音に含まれる<b>最高周波数の2倍以上</b>の標本化周波数で標本化すれば、元の波形を復元できる。人間の可聴域は約20Hz〜<b>20kHz</b>なので、CDはその2倍強の<b>44.1kHz</b>を採用している。' },
    { h:'ステップ2：量子化', p:'測定した波の高さを、あらかじめ決めた<b>段階値に丸める</b>。段階の数を決めるのが<b>量子化ビット数</b>で、nビットなら<b>2ⁿ段階</b>（CDは16ビット＝65,536段階）。丸めるときに生じるずれが<b>量子化誤差</b>で、ビット数を増やすほど誤差は小さくなるがデータ量は増える。' },
    { h:'ステップ3：符号化とデータ量の計算', p:'量子化した値を2進数のビット列に変換するのが<b>符号化</b>。データ量は次の式で計算できる。<br><code>データ量(ビット) ＝ 標本化周波数 × 量子化ビット数 × チャンネル数 × 秒数</code><br>（ステレオはチャンネル数2、モノラルは1。バイトにするには8で割る）' },
    { h:'音の圧縮', p:'CD品質の音は1分で約10MBと大きいため、<b>MP3</b>や<b>AAC</b>などの<b>非可逆圧縮</b>が使われる。人間の耳に聞こえにくい成分（マスキングされる音など）を削ることで、音質の低下を抑えながら約10分の1に圧縮できる。1秒あたりのデータ量を<b>ビットレート（bps）</b>といい、値が大きいほど高音質・大容量。' },
  ],
  ex:[
    { q:'標本化周波数44.1kHz、量子化ビット数16ビット、ステレオ（2ch）で1分間録音したときのデータ量は約何MBか（1MB=10⁶バイトとする）。',
      s:'44,100 × 16 × 2 × 60 ＝ 84,672,000ビット。<br>バイトへ：84,672,000 ÷ 8 ＝ 10,584,000バイト ≒ <b>約10.6MB</b>。<br>「CD品質は1分約10MB」と相場を覚えておくと検算に使える。' },
  ],
  key:'<b>標本化（時間を区切る）→量子化（高さを丸める）→符号化（2進数へ）</b>の順序と役割を混同しないこと。標本化定理「<b>最高周波数の2倍以上</b>」は必ず出る。',
  quiz:[
    { q:'最高4kHzの音声を復元できるようにするために必要な最低の標本化周波数は？', o:['8kHz','4kHz','2kHz','16kHz'], e:'標本化定理より2倍の8kHz以上。電話の音声がおよそこの品質。' },
    { q:'量子化ビット数を16ビットから8ビットに減らすと何が起こるか？', o:['音の段階が65,536から256に減り音質が下がるが、データ量は半分になる','音が高くなる','標本化の間隔が半分になる','チャンネル数が減る'], e:'量子化ビット数は「高さ方向の細かさ」。時間方向（標本化）とは独立。' },
    { q:'音のデジタル化の正しい手順は？', o:['標本化→量子化→符号化','量子化→標本化→符号化','符号化→標本化→量子化','標本化→符号化→量子化'], e:'時間で区切る→段階に丸める→2進数にする。' },
    { q:'標本化周波数10kHz、量子化ビット数16ビット、モノラルで5秒間のデータ量は？', o:['100,000バイト','800,000バイト','50,000バイト','12,500バイト'], e:'10,000×16×1×5=800,000ビット。÷8で100,000バイト（100kB）。ビットとバイトの変換を忘れない。' },
    { q:'CDの標本化周波数が44.1kHzに設定されている理由は？', o:['人間の可聴域の上限約20kHzの2倍以上を確保するため','人間の声の周波数と同じだから','機械が出せる最高の周波数だから','キリのよい数字だから'], e:'可聴域上限20kHz×2=40kHz以上が必要という標本化定理に基づく設計。' },
  ]},

{ title:'画像・動画のデジタル化と圧縮',
  secs:[
    { h:'画像のデジタル化：画素・解像度・階調', p:'画像を格子状の点（<b>画素・ピクセル</b>）に分割し（標本化に相当）、各画素の色や明るさを段階値にして（量子化）、2進数で表す（符号化）。画素の細かさが<b>解像度</b>（プリンタやスキャナでは1インチあたりの点の数<b>dpi</b>で表す）、明るさの段階数が<b>階調</b>（nビットで2ⁿ階調。白黒2値は1ビット、グレースケールは8ビット256階調が標準）。' },
    { h:'色の表現：RGBとCMYK', p:'ディスプレイは<b>光の三原色RGB</b>（赤Red・緑Green・青Blue）の<b>加法混色</b>：重ねるほど明るくなり、3色すべてで<b>白</b>。赤＋緑＝黄、緑＋青＝シアン、赤＋青＝マゼンタ。印刷は<b>色の三原色CMY</b>（シアン・マゼンタ・イエロー）の<b>減法混色</b>：重ねるほど暗くなる（実際は黒Kを加えた<b>CMYK</b>）。RGB各色を8ビット（0〜255）で表すと<b>24ビットフルカラー＝約1,677万色</b>。Webのカラーコードは16進数で <code>#FF0000</code>＝赤のように書く。' },
    { h:'画像のデータ量', p:'<code>データ量(ビット) ＝ 画素数（横×縦） × 1画素あたりのビット数</code>。例：フルHD（1920×1080）の24ビット画像は 1920×1080×24 ≒ 4,980万ビット ≒ <b>約6.2MB</b>（非圧縮）。解像度を2倍にすると画素数は4倍になる点に注意。' },
    { h:'ラスタ形式とベクタ形式', p:'<ul><li><b>ラスタ（ビットマップ）形式</b>：画素の集まりで表す。写真向き。<b>拡大するとギザギザ（ジャギー）が目立つ</b>。JPEG・PNG・BMPなど</li><li><b>ベクタ形式</b>：点の座標と数式（線・曲線・塗り）で表す。<b>拡大しても劣化しない</b>。ロゴ・イラスト・フォント向き。SVGなど</li></ul>' },
    { h:'圧縮のしくみ', p:'<b>可逆圧縮</b>（完全に元へ戻せる：PNG、ZIP、GIF）と<b>非可逆圧縮</b>（元に戻らないが高圧縮：JPEG、MP3、MP4）。可逆圧縮の代表的な考え方が<b>ランレングス圧縮</b>：同じ値の連続を「値×回数」で表す（例：<code>AAAAABBBCC</code>→<code>A5B3C2</code>）。<b>圧縮率＝圧縮後のデータ量÷圧縮前のデータ量</b>（×100で%）。値が小さいほどよく縮んでいる。動画は静止画（<b>フレーム</b>）の連続で、1秒あたりの枚数が<b>フレームレート（fps）</b>。前のフレームとの<b>差分だけを記録するフレーム間圧縮</b>で大幅に圧縮している。' },
  ],
  ex:[
    { q:'横640×縦480画素、24ビットフルカラーの非圧縮画像のデータ量は何バイトか。',
      s:'画素数＝640×480＝307,200画素。<br>1画素24ビット＝3バイトなので、307,200×3＝<b>921,600バイト（約0.9MB）</b>。<br>ビットで計算してから8で割ってもよい：307,200×24÷8＝921,600。' },
    { q:'「白白白白白黒黒白白白」という10画素をランレングス圧縮で「白5黒2白3」と表した。1画素1文字と数えるとき、圧縮率は何%か。',
      s:'圧縮前10文字→圧縮後6文字（白5黒2白3）。<br>圧縮率＝6÷10×100＝<b>60%</b>。<br>ランレングスは「同じ値が長く続くデータ」（単純なイラスト等）に強く、写真のように変化が多いデータでは逆に増えることもある。' },
  ],
  key:'加法混色（RGB・重ねて白）と減法混色（CMY・重ねて黒）の対比。データ量計算は<b>画素数×ビット数÷8</b>。ベクタは<b>拡大に強い</b>。',
  quiz:[
    { q:'光の三原色で、赤と緑を重ねると何色になるか？', o:['黄','シアン','マゼンタ','白'], e:'加法混色：R+G=黄、G+B=シアン、R+B=マゼンタ、R+G+B=白。' },
    { q:'横400×縦300画素、8ビットグレースケールの非圧縮画像のデータ量は？', o:['120,000バイト','960,000バイト','40,000バイト','12,000バイト'], e:'400×300=120,000画素×8ビット=960,000ビット÷8=120,000バイト。8ビット=1バイトなので画素数と同じになる。' },
    { q:'ベクタ形式の画像の特徴として正しいものは？', o:['拡大しても輪郭が滑らかなまま劣化しない','写真の表現に最も適している','画素の集まりとして色を記録している','必ずJPEGより容量が大きい'], e:'座標と数式で表すため拡大自由。ロゴやアイコンに使われる。写真向きなのはラスタ形式。' },
    { q:'1MBの画像ファイルを圧縮したら250kBになった。圧縮率（圧縮後÷圧縮前）は？', o:['25%','75%','40%','4%'], e:'250kB÷1000kB=0.25→25%。数値が小さいほど強く圧縮されている。' },
    { q:'動画の圧縮で「前のフレームとの差分だけを記録する」方式を何というか？', o:['フレーム間圧縮','ランレングス圧縮','可逆圧縮','標本化'], e:'背景が動かない映像ほどよく縮む。MPEG系（MP4等）の基本アイデア。' },
  ]},

{ title:'情報デザイン',
  secs:[
    { h:'情報デザインの3つの方法', p:'情報デザイン＝<b>情報を相手に的確に伝えるための整理・表現の工夫</b>。3つの基本手法がある。<ul><li><b>抽象化</b>：余分な情報をそぎ落として本質だけ残す。例：<b>ピクトグラム</b>（非常口マーク）、アイコン、地図記号、<b>路線図</b>（実際の地形を無視して駅のつながりだけ表す）</li><li><b>構造化</b>：情報を関係に基づいて整理する。順序（時系列・五十音）、<b>階層</b>（Webサイトのカテゴリ分け）、並列など</li><li><b>可視化</b>：数値や関係を図やグラフで見えるようにする。<b>インフォグラフィックス</b>（図解・地図・グラフを組み合わせた表現）</li></ul>' },
    { h:'グラフの使い分け', p:'<div class="tbl-scroll"><table><tr><th>目的</th><th>適したグラフ</th></tr><tr><td>量の<b>比較</b></td><td>棒グラフ</td></tr><tr><td>時間による<b>推移</b></td><td>折れ線グラフ</td></tr><tr><td>全体に占める<b>割合</b></td><td>円グラフ・帯グラフ</td></tr><tr><td>2つの量の<b>関係</b></td><td>散布図</td></tr><tr><td><b>分布</b>のようす</td><td>ヒストグラム・箱ひげ図</td></tr></table></div>3D円グラフは手前が大きく見えるなど、<b>印象操作につながる見せ方</b>（軸の省略・目盛りの操作）にも注意する。' },
    { h:'デザインの4原則', p:'<ul><li><b>近接</b>：関連する要素は近づけ、無関係な要素は離す（グループが一目でわかる）</li><li><b>整列</b>：要素の端や中心線をそろえる（見えない線を作る）</li><li><b>反復</b>：色・フォント・レイアウトのルールを繰り返す（統一感）</li><li><b>対比（強弱）</b>：重要な要素は大きく・太く・色を変えて目立たせる（優先順位）</li></ul>ポスターやスライドの改善問題では、この4原則の用語で指摘できるようにする。' },
    { h:'色と文字のデザイン', p:'色は<b>色相</b>（色みの種類）・<b>明度</b>（明るさ）・<b>彩度</b>（鮮やかさ）の三属性で決まる。文字は、画面や見出しには線の太さが均一で視認性が高い<b>ゴシック体</b>、紙の長文には可読性の高い<b>明朝体</b>が向く。強調は色数を増やすより<b>太さ・大きさ</b>で。1枚のスライドに使う色は3色程度に抑えるのが基本。' },
    { h:'ユニバーサルデザインとアクセシビリティ', p:'<b>ユニバーサルデザイン（UD）</b>＝年齢・障害・言語などにかかわらず、はじめから<b>誰もが使えるように設計</b>する考え方。<b>アクセシビリティ</b>＝情報やサービスへの<b>アクセスのしやすさ</b>。<b>ユーザビリティ</b>＝目的を達成する際の<b>使いやすさ・効率</b>。Webでの具体策：<ul><li>画像に<b>代替テキスト</b>（読み上げソフト対応）</li><li>色だけに頼らず<b>形やラベルを併用</b>（カラーユニバーサルデザイン）</li><li>文字と背景の<b>コントラスト</b>を確保、動画に<b>字幕</b></li></ul>「それとわかる手がかり」（押せそうなボタンの立体感など）を<b>シグニファイア</b>という。' },
  ],
  ex:[
    { q:'文化祭ポスターの下書きが「情報がバラバラに散らばり、フォントが5種類、日時だけ小さい」状態だった。デザインの4原則を使って改善点を3つ挙げよ。',
      s:'①<b>近接</b>：日時・場所・料金などの開催情報はひとかたまりに配置する。②<b>反復</b>：フォントは見出し用と本文用の2種類程度に統一し、同じ役割には同じスタイルを繰り返す。③<b>対比</b>：いちばん伝えたい情報（企画名と日時）を最も大きく・太くして視線の優先順位を作る。さらに<b>整列</b>で端をそろえると全体が引き締まる。' },
  ],
  key:'4原則は<b>近接・整列・反復・対比</b>。UD（はじめから皆が使える設計）とアクセシビリティ（到達しやすさ）とユーザビリティ（使いやすさ）は区別して覚える。',
  quiz:[
    { q:'鉄道の路線図が実際の地形や距離を無視して描かれているのは、どの手法の例か？', o:['抽象化','可視化','暗号化','正規化'], e:'「駅の順序と乗り換え」という本質だけを残し、他を削ぎ落とす抽象化の代表例。' },
    { q:'全体に占める各項目の割合を示すのに適したグラフは？', o:['円グラフ','折れ線グラフ','散布図','ヒストグラム'], e:'割合＝円・帯。推移＝折れ線、比較＝棒、関係＝散布図、分布＝ヒストグラム。' },
    { q:'「関連する情報同士を近くに配置する」というデザイン原則は？', o:['近接','整列','反復','対比'], e:'距離が意味を表す。近くにあるものは関係があると認識される。' },
    { q:'カラーユニバーサルデザインの配慮として適切なものは？', o:['色の違いに加えて形やラベルでも区別できるようにする','情報をすべて赤と緑で塗り分ける','彩度の高い色を多数使う','文字と背景のコントラストを弱める'], e:'色覚の多様性に対応するには「色だけに頼らない」ことが原則。' },
    { q:'アクセシビリティの説明として最も適切なものは？', o:['障害の有無などにかかわらず情報やサービスに到達し利用できること','操作の速さと効率のこと','デザインの美しさのこと','通信速度の速さのこと'], e:'到達・利用のしやすさがアクセシビリティ。効率・満足度はユーザビリティの領域。' },
  ]},
]},

{ name:'コンピュータとプログラミング', lessons:[

{ title:'コンピュータの構成と動作原理',
  secs:[
    { h:'五大装置', p:'コンピュータのハードウェアは<b>入力・記憶・演算・制御・出力</b>の五大装置で構成される。<div class="tbl-scroll"><table><tr><th>装置</th><th>役割</th><th>例</th></tr><tr><td>入力装置</td><td>データを取り込む</td><td>キーボード、マウス、タッチパネル、センサー</td></tr><tr><td>記憶装置</td><td>プログラムとデータを保存</td><td>メモリ（主記憶）、SSD/HDD（補助記憶）</td></tr><tr><td><b>演算装置</b></td><td>計算・比較を行う</td><td rowspan="2"><b>CPU</b>（中央処理装置）</td></tr><tr><td><b>制御装置</b></td><td>各装置に指示を出す</td></tr><tr><td>出力装置</td><td>結果を外部に出す</td><td>ディスプレイ、プリンタ、スピーカー</td></tr></table></div>' },
    { h:'CPUと命令実行サイクル', p:'CPUは主記憶からプログラムの命令を<b>①取り出し（フェッチ）→②解読→③実行</b>のサイクルで処理し続ける。動作のタイミングを合わせる信号が<b>クロック</b>で、<b>クロック周波数</b>（GHz＝1秒あたり10⁹回）が高いほど原則として処理が速い。CPU内部の小さな高速記憶場所を<b>レジスタ</b>という。' },
    { h:'メモリの階層', p:'記憶装置は「速いほど高価で小容量」というトレードオフがあり、階層構造で使い分ける：<b>レジスタ ＞ キャッシュメモリ ＞ 主記憶（メインメモリ） ＞ 補助記憶（SSD/HDD）</b>（左ほど高速・小容量）。主記憶に使われる<b>RAM</b>は電源を切ると内容が消える（<b>揮発性</b>）。<b>ROM</b>は読み出し専用で不揮発。SSDはHDDより高速・衝撃に強いが、容量あたりの価格は高め。' },
    { h:'ソフトウェアと言語処理', p:'ソフトウェアは<b>基本ソフトウェア（OS）</b>と<b>応用ソフトウェア（アプリ）</b>に分かれる。OSの仕事：ハードウェアの管理、メモリやCPU時間の割り当て、ファイル管理、ユーザインタフェースの提供など。CPUが直接実行できるのは<b>機械語</b>（0と1の列）だけなので、人間が書いたプログラミング言語は翻訳が必要：<ul><li><b>コンパイラ</b>：実行前に<b>一括翻訳</b>する（実行が速い）</li><li><b>インタプリタ</b>：実行しながら<b>1行ずつ翻訳</b>する（手直しと実行が手軽。Pythonはこちら寄り）</li></ul>' },
  ],
  ex:[
    { q:'クロック周波数3GHzのCPUは、1秒間に何回のクロックを刻むか。',
      s:'G（ギガ）＝10⁹ なので、3GHz＝<b>1秒間に30億回</b>。1命令が1クロックで終わると単純化すれば毎秒30億命令のオーダー。実際は1命令に複数クロックかかったり、複数コアで並列処理したりするため、クロック周波数だけで性能は決まらない。' },
  ],
  key:'CPU＝<b>演算＋制御</b>。メモリ階層は<b>レジスタ→キャッシュ→主記憶→補助記憶</b>の順に遅く・大きく・安くなる。RAMは<b>揮発性</b>。',
  quiz:[
    { q:'CPUが命令を処理する正しい順序は？', o:['取り出し→解読→実行','解読→取り出し→実行','実行→取り出し→解読','取り出し→実行→解読'], e:'フェッチ→デコード→実行のサイクルを高速に繰り返している。' },
    { q:'電源を切ると記憶内容が消える（揮発性の）装置は？', o:['主記憶に使われるRAM','SSD','HDD','ROM'], e:'だから編集中のファイルは補助記憶への「保存」が必要。' },
    { q:'記憶装置をアクセスが速い順に並べたものは？', o:['レジスタ→キャッシュ→主記憶→SSD','SSD→主記憶→キャッシュ→レジスタ','主記憶→レジスタ→SSD→キャッシュ','キャッシュ→SSD→レジスタ→主記憶'], e:'CPUに近いほど高速・小容量・高価。' },
    { q:'インタプリタ方式の説明として正しいものは？', o:['プログラムを1行ずつ翻訳しながら実行する','実行前に全体を機械語に一括翻訳する','機械語を人間の言葉に翻訳する','ハードウェアを物理的に制御する装置である'], e:'一括翻訳はコンパイラ。インタプリタは修正→即実行の手軽さが利点。' },
    { q:'OSの役割として適切でないものは？', o:['文書や表を作成する機能を提供する','CPUやメモリなどの資源を管理する','ファイルを管理する','ユーザインタフェースを提供する'], e:'文書作成はアプリ（応用ソフトウェア）の仕事。OSは土台の管理役。' },
  ]},

{ title:'論理回路',
  secs:[
    { h:'論理演算の基本3つ', p:'コンピュータの回路は、1（真）と0（偽）を扱う<b>論理演算</b>の組み合わせでできている。<div class="tbl-scroll"><table><tr><th>A</th><th>B</th><th>AND<br>（A・B）</th><th>OR<br>（A＋B）</th><th>XOR<br>（A⊕B）</th></tr><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>0</td><td>1</td><td>0</td><td>1</td><td>1</td></tr><tr><td>1</td><td>0</td><td>0</td><td>1</td><td>1</td></tr><tr><td>1</td><td>1</td><td><b>1</b></td><td><b>1</b></td><td><b>0</b></td></tr></table></div><b>AND（論理積）</b>＝両方1のとき1。<b>OR（論理和）</b>＝少なくとも一方が1なら1。<b>NOT（否定）</b>＝入力を反転（1→0、0→1）。入力と出力の対応表を<b>真理値表</b>という。' },
    { h:'XOR・NAND・NOR', p:'<b>XOR（排他的論理和）</b>＝AとBが<b>異なる</b>ときだけ1（同じなら0）。「どちらか一方だけ」の判定や加算回路に使う。<b>NAND</b>＝ANDの出力を反転（両方1のときだけ0）。<b>NOR</b>＝ORの出力を反転。<b>NANDだけを組み合わせればAND・OR・NOTすべてを作れる</b>ため、NANDは万能ゲートと呼ばれる。' },
    { h:'半加算器：1桁の足し算回路', p:'2進数1桁どうしの加算 A＋B は「和S」と「桁上がりC」を出す。真理値表を見ると、<b>SはXOR、CはAND</b>と一致する。つまり<b>半加算器＝XORゲート＋ANDゲート</b>。例：1＋1 → S=0、C=1（つまり10(2)=2）。' },
    { h:'全加算器と多桁の加算', p:'2桁目以降は下の桁からの<b>桁上がり入力</b>も足す必要がある。3つの入力（A・B・下からの桁上がり）を処理するのが<b>全加算器</b>で、<b>半加算器2個とORゲート1個</b>で作れる。全加算器を桁数分つなげば何桁の加算器でも作れる——CPUの計算の正体はこの論理回路の積み重ね。' },
    { h:'応用：多数決回路', p:'3入力A、B、Cのうち2つ以上が1なら1を出す<b>多数決回路</b>は、論理式で <code>Y ＝ A・B ＋ B・C ＋ C・A</code> と書ける（どれか2組が同時に1ならY=1）。真理値表から論理式を立てる練習をしておくと、共通テストの回路問題に対応できる。実際に動かして確かめたい人は当ラボの<b>論理回路シミュレータ</b>へ。' },
  ],
  ex:[
    { q:'多数決回路 Y＝A・B＋B・C＋C・A について、A=1、B=0、C=1 のときの出力Yを求めよ。',
      s:'各項を計算：A・B＝1・0＝0、B・C＝0・1＝0、C・A＝1・1＝<b>1</b>。<br>OR：0＋0＋1＝<b>1</b>。<br>1が2票（AとC）で多数なので、直感とも一致する。' },
  ],
  key:'真理値表は自分で書けるように。<b>半加算器＝XOR（和）＋AND（桁上がり）</b>、<b>全加算器＝半加算器2個＋OR</b>は構成まで問われる。',
  quiz:[
    { q:'XOR演算で 1⊕1 の結果は？', o:['0','1','2','10'], e:'XORは「異なるとき1」。同じ値どうしなので0。' },
    { q:'半加算器で「和S」を出力するのに使われるゲートは？', o:['XOR','AND','OR','NOT'], e:'S=A⊕B、桁上がりC=A・B。真理値表がXOR・ANDと一致することを確認しておこう。' },
    { q:'半加算器に A=1、B=1 を入力したときの出力は？', o:['S=0、C=1','S=1、C=0','S=1、C=1','S=0、C=0'], e:'1+1=10(2)。和の桁は0、桁上がりが1。' },
    { q:'全加算器の構成として正しいものは？', o:['半加算器2個とORゲート1個','半加算器1個のみ','ANDゲート3個のみ','NOTゲート2個とXOR1個'], e:'下位からの桁上がりを処理するため半加算器を2段使い、桁上がり出力をORでまとめる。' },
    { q:'NANDゲートの出力が0になるのはどんなときか？', o:['入力が両方とも1のとき','入力が両方とも0のとき','入力が異なるとき','入力の少なくとも一方が0のとき'], e:'NAND=ANDの否定。ANDが1になる「両方1」のときだけ0。' },
  ]},

{ title:'アルゴリズムとプログラムの基本',
  secs:[
    { h:'アルゴリズムと3つの制御構造', p:'問題を解くための明確な手順が<b>アルゴリズム</b>。<b>フローチャート</b>では、端子（開始・終了）＝角丸、処理＝長方形、<b>判断＝ひし形</b>、入出力＝平行四辺形の記号で表す。どんな複雑なプログラムも<b>順次</b>（上から順に）・<b>分岐</b>（条件で枝分かれ）・<b>反復</b>（繰り返し）の3構造の組み合わせで書ける（構造化定理）。' },
    { h:'変数・代入・演算子', p:'<b>変数</b>＝値に名前を付けた入れ物。<code>x = 5</code> の「=」は<b>代入</b>（右辺を計算して左辺に入れる）。だから <code>x = x + 1</code> は「今のxに1を足して入れ直す」。主な演算子：<div class="tbl-scroll"><table><tr><th>演算子</th><th>意味</th><th>例</th></tr><tr><td><code>+ - * /</code></td><td>四則演算</td><td><code>7 / 2</code> → 3.5</td></tr><tr><td><code>//</code></td><td><b>整数の商</b>（切り捨て）</td><td><code>7 // 2</code> → 3</td></tr><tr><td><code>%</code></td><td><b>余り</b></td><td><code>7 % 2</code> → 1</td></tr><tr><td><code>**</code></td><td>べき乗</td><td><code>2 ** 3</code> → 8</td></tr><tr><td><code>== !=</code></td><td>等しい／等しくない</td><td><code>x == 5</code></td></tr></table></div><code>%</code>（余り）は「偶数判定 <code>x % 2 == 0</code>」「3の倍数判定」などに頻出。' },
    { h:'分岐（if文）', p:'<code>if 条件: → 真のときの処理</code>、<code>else:</code> で偽のとき、<code>elif</code> で複数条件を順に判定。Pythonでは<b>インデント（字下げ）がブロックの範囲</b>を表す。複数条件は <code>and</code>（かつ）、<code>or</code>（または）、<code>not</code>（否定）で組み合わせる。例：<code>if 60 &lt;= ten and ten &lt; 80:</code>' },
    { h:'反復（for文・while文）', p:'<b>for文</b>＝回数や範囲が決まった繰り返し。<code>for i in range(5):</code> は i が <b>0,1,2,3,4</b> と変わりながら5回実行（<b>5は含まない</b>）。<code>range(1, 6)</code> なら1〜5。<b>while文</b>＝条件が真の間繰り返す。<code>while i &lt; 3:</code> は i が3以上になったら終了。条件が永遠に真だと<b>無限ループ</b>になるので、ループ内で条件に関わる変数を必ず更新する。' },
    { h:'トレースと共通テストの疑似コード', p:'プログラムを1行ずつ紙の上で実行し、変数の値の変化を表にするのが<b>トレース</b>。試験のプログラム問題はトレース力がすべてと言ってよい。共通テストは独自の疑似コード（DNCL系）で出題されるが、Pythonと考え方は同じ：<div class="tbl-scroll"><table><tr><th>共通テスト表記</th><th>Python</th></tr><tr><td><code>x ← 1</code></td><td><code>x = 1</code></td></tr><tr><td><code>表示する(x)</code></td><td><code>print(x)</code></td></tr><tr><td><code>もし x &gt; 0 ならば</code></td><td><code>if x &gt; 0:</code></td></tr><tr><td><code>i を 1 から 5 まで 1 ずつ増やしながら繰り返す</code></td><td><code>for i in range(1, 6):</code></td></tr></table></div>' },
  ],
  ex:[
    { q:'次のプログラムを実行した後の gokei の値をトレースして求めよ。<br><code>gokei = 0</code><br><code>for i in range(1, 6):</code><br><code>　gokei = gokei + i</code>',
      s:'range(1,6) なので i は 1〜5。トレース表：<div class="tbl-scroll"><table><tr><th>i</th><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td></tr><tr><th>gokei</th><td>1</td><td>3</td><td>6</td><td>10</td><td><b>15</b></td></tr></table></div>1から5までの合計で<b>15</b>。「合計を求めるには、0で初期化した変数にループで足し込む」——この<b>累積パターン</b>は最重要の定型。' },
  ],
  key:'<code>range(a, b)</code> は <b>aからb−1まで</b>。<code>//</code>は商、<code>%</code>は余り。プログラム問題は必ず<b>トレース表</b>を書く——頭の中だけでやらない。',
  quiz:[
    { q:'7 % 3 の値は？', o:['1','2','3','2.33'], e:'7÷3=2余り1。%は余りを返す演算子。' },
    { q:'5 // 2 の値は？', o:['2','2.5','3','1'], e:'//は小数点以下を切り捨てた整数の商。5÷2=2.5→2。' },
    { q:'x = 1 のあと、x = x * 3 、さらに x = x + 2 を実行すると x の値は？', o:['5','6','9','3'], e:'1×3=3、3+2=5。代入は「右辺を計算してから左辺へ」。' },
    { q:'for i in range(2, 8): のループは何回実行されるか？', o:['6回','7回','8回','5回'], e:'iは2,3,4,5,6,7の6回。回数=終わり−始め。' },
    { q:'i = 0 から始めて while i < 3: のループ内で i = i + 1 だけを行うとき、ループ終了直後の i の値は？', o:['3','2','4','0'], e:'i=0,1,2のとき条件が真で実行され、i=3になった時点で条件が偽になり終了。終了時のiは3。' },
  ]},

{ title:'リスト（配列）と関数',
  secs:[
    { h:'リストの基本', p:'複数の値をまとめて扱うのが<b>リスト（配列）</b>。<code>a = [70, 85, 60]</code> のように作り、<b>添字（インデックス）は0から始まる</b>：<code>a[0]</code>→70、<code>a[1]</code>→85、<code>a[2]</code>→60。要素数は <code>len(a)</code>（この例では3）。最後の要素の添字は <b>len(a)−1</b>——「要素数と最大添字のずれ」がミスの定番ポイント。' },
    { h:'リストとループの定型処理', p:'リスト処理はループとの組み合わせが基本形。<b>合計</b>：<code>gokei = 0</code> のあと <code>for i in range(len(a)): gokei = gokei + a[i]</code>。<b>最大値探索</b>：<code>saidai = a[0]</code> で初期化し、<code>for</code>で回して <code>if a[i] &gt; saidai: saidai = a[i]</code> と更新していく。この「<b>暫定チャンピオンを更新していく</b>」形は最頻出パターン。' },
    { h:'2次元リスト', p:'リストの中にリストを入れると表形式のデータを扱える。<code>b = [[1, 2, 3], [4, 5, 6]]</code> のとき <code>b[0]</code>→[1,2,3]、<code>b[1][0]</code>→4（<b>行→列の順</b>で指定）。成績表（生徒×科目）などの処理は2重ループ <code>for i ... for j ...</code> で全マスを走査する。' },
    { h:'関数', p:'処理に名前を付けて再利用できるようにしたものが<b>関数</b>。<br><code>def bai(x):</code><br><code>　return x * 2</code><br>のように定義し、<code>bai(5)</code> と呼び出すと10が返る。<code>x</code>のような受け取り口が<b>引数</b>、<code>return</code>が<b>戻り値</b>。<code>print()</code>、<code>len()</code>、<code>int()</code>、<code>max()</code> などはあらかじめ用意された<b>組み込み関数</b>。' },
    { h:'乱数とシミュレーションへの応用', p:'<code>import random</code> して <code>random.randint(1, 6)</code> と書くと1〜6の整数がランダムに得られる（サイコロ）。「サイコロを1000回振って6が出た回数を数える」のような<b>乱数×ループ×カウント</b>の組み合わせは、モデル化とシミュレーションの単元にも直結する。' },
  ],
  ex:[
    { q:'次のプログラムで最大値を探すとき、変数 saidai の値が「更新される」のは何回か。<br><code>a = [70, 85, 60, 95, 75]</code><br><code>saidai = a[0]</code><br><code>for i in range(1, len(a)):</code><br><code>　if a[i] &gt; saidai:</code><br><code>　　saidai = a[i]</code>',
      s:'初期値 saidai=70。<br>i=1: 85＞70 → 更新（85）…1回目<br>i=2: 60＞85 → 更新なし<br>i=3: 95＞85 → 更新（95）…2回目<br>i=4: 75＞95 → 更新なし<br>答えは<b>2回</b>。「何回更新されるか」「最終値はいくつか」を分けて問うのが試験の定番。' },
  ],
  key:'添字は<b>0始まり</b>、最後の添字は<b>len−1</b>。最大値探索は「<b>先頭で初期化→比較して更新</b>」の型で暗記レベルに。',
  quiz:[
    { q:'a = [10, 20, 30, 40] のとき len(a) の値は？', o:['4','3','40','10'], e:'len()は要素の個数を返す。最大の添字は3であることと混同しない。' },
    { q:'a = [10, 20, 30, 40] のとき a[3] の値は？', o:['40','30','20','エラーになる'], e:'添字0始まりなのでa[0]=10、a[3]=40。' },
    { q:'b = [[1, 2], [3, 4]] のとき b[1][0] の値は？', o:['3','2','1','4'], e:'b[1]は[3,4]、その0番目は3。行→列の順で読む。' },
    { q:'def f(x): return x * 2 + 1 と定義したとき f(3) の値は？', o:['7','6','8','9'], e:'3×2+1=7。引数3がxに入り、returnの式の値が返る。' },
    { q:'a = [3, 7, 5, 9] に対して「先頭で初期化して更新する」最大値探索を行うとき、更新は何回起こるか？', o:['2回','1回','3回','4回'], e:'初期値3→7で更新（1回目）→5はスキップ→9で更新（2回目）。' },
  ]},

{ title:'探索と整列のアルゴリズム',
  secs:[
    { h:'線形探索', p:'リストの<b>先頭から順に</b>目的の値と比較していく最も素朴な探索。データがどんな並びでも使えるが、n件のデータで<b>最大n回、平均およそn/2回</b>の比較が必要。' },
    { h:'二分探索', p:'<b>整列済み</b>のデータ限定で使える高速な探索。①<b>中央</b>の値と比較 → ②目的の値が小さければ左半分、大きければ右半分に絞る → ③これを繰り返す。1回の比較で候補が<b>半分</b>になるため、最大比較回数は<b>2ᵏ≧データ数となる最小のk</b>程度。1,000件でも約10回、100万件でも約20回で見つかる。<b>「整列済みであること」が絶対条件</b>。' },
    { h:'整列（ソート）', p:'<ul><li><b>交換法（バブルソート）</b>：<b>隣り合う要素</b>を比較し、順序が逆なら交換しながら端まで進む。1回のパス（走査）が終わると<b>最大値が末尾に確定</b>する。これをn−1回繰り返す</li><li><b>選択法（選択ソート）</b>：未整列部分から<b>最小値を探して先頭と交換</b>することを繰り返す</li></ul>どちらも比較回数は最大 <b>n(n−1)/2</b> 回。例：n=10なら45回。' },
    { h:'アルゴリズムの効率（計算量の考え方）', p:'同じ問題でもアルゴリズム次第で手間が桁違いに変わる。データがn倍になったとき、線形探索の手間は<b>n倍</b>、単純な整列は<b>約n²倍</b>、二分探索は<b>ほとんど増えない（log）</b>。「データ量が増えたとき手間がどう増えるか」で効率を評価する、というのが計算量の考え方。効率のよいアルゴリズムを選ぶことは、速いコンピュータを買うより効果的なことが多い。' },
  ],
  ex:[
    { q:'整列済みリスト [2, 5, 8, 11, 14, 17, 20]（7件）から17を二分探索で探す。何回の比較で見つかるか。',
      s:'1回目：中央は11（4番目）。17＞11 → 右半分 [14, 17, 20] に絞る。<br>2回目：中央は17。<b>一致！</b><br>答えは<b>2回</b>。線形探索なら先頭から6回目。データが大きいほど差は圧倒的になる。' },
    { q:'リスト [5, 3, 8, 1] にバブルソート（昇順・隣接交換）の1回目のパスを行うと、どう並ぶか。',
      s:'5と3を比較→交換 [3,5,8,1]。5と8→そのまま。8と1→交換 [3,5,1,8]。<br>1パス終了後は <b>[3, 5, 1, 8]</b>。<b>最大値8が末尾に確定</b>していることに注目。パスを繰り返すごとに右側から順に確定していく。' },
  ],
  key:'二分探索＝<b>整列済み限定・1回で半分</b>。最大比較回数は「2の何乗でデータ数を超えるか」。バブルソートは<b>1パスで最大値が末尾に確定</b>。',
  quiz:[
    { q:'二分探索を使うために必要な前提条件は？', o:['データが整列されていること','データがすべて整数であること','データ数が奇数であること','データに重複がないこと'], e:'大小比較で半分に絞る以上、並んでいなければ成立しない。' },
    { q:'63件の整列済みデータを二分探索するときの最大比較回数は約何回か？', o:['6回','32回','63回','12回'], e:'2⁶=64≧63なので約6回。1回ごとに候補が半分になる。' },
    { q:'バブルソート（昇順）で1回目のパスが終わった直後に保証されることは？', o:['最大値が末尾に確定している','最小値が先頭に確定している','全体が整列し終わっている','中央値が中央に来ている'], e:'隣接交換で大きい値が右へ運ばれていくため、パスごとに右端から確定する。' },
    { q:'100件のデータを線形探索するときの平均的な比較回数はおよそ何回か？', o:['50回','100回','10回','7回'], e:'目的の値が平均して真ん中あたりで見つかるとすればn/2=50回。最悪は100回。' },
    { q:'8件のデータを単純な整列法（バブルソート等）で並べ替えるときの最大比較回数 n(n−1)/2 は？', o:['28回','56回','64回','16回'], e:'8×7÷2=28回。n=100なら4,950回——nの2乗で効いてくる。' },
  ]},

{ title:'モデル化とシミュレーション',
  secs:[
    { h:'モデルとモデル化', p:'現実の対象を、<b>目的に必要な要素だけ残して単純化</b>した表現が<b>モデル</b>。分類のしかたは2軸ある。<ul><li><b>表現形式による分類</b>：物理モデル（模型・実物大模型）、図的モデル（路線図・フローチャート）、<b>数理モデル</b>（数式）</li><li><b>特性による分類</b>：時間変化を含むか（<b>動的</b>／静的）、偶然の要素を含むか（<b>確率的</b>／<b>確定的</b>）</li></ul>例：毎月の貯金残高（利息固定）＝動的・確定的モデル。サイコロを使うすごろく＝動的・確率的モデル。' },
    { h:'シミュレーションとは', p:'モデルを使って模擬実験することが<b>シミュレーション</b>。実物では<b>危険・高コスト・時間がかかる・やり直せない</b>実験（避難、渋滞、感染症の拡大、経営判断）を、条件（<b>パラメータ</b>）を変えながら何度でも安全に試せる。手順：<b>モデル化 → 実行 → 結果の検証（現実と比較）→ モデルの改善</b>。' },
    { h:'確定的モデルの例：数式で予測する', p:'「毎月1,000円ずつ貯金し、最初に5,000円持っている」なら、nか月後の残高は <code>残高 = 5000 + 1000 × n</code>。このように漸化式・数式にできれば、プログラムのループで将来を計算できる。人口増加、薬の血中濃度、複利計算などが定番の題材。' },
    { h:'確率的モデルと乱数・モンテカルロ法', p:'偶然を含む現象は<b>乱数</b>で模擬する。<b>モンテカルロ法</b>＝乱数を大量に使って近似解を得る手法。有名なのが円周率の推定：1×1の正方形内にランダムに点を打ち、原点から距離1以内（四分円の内側）に入った点の割合は π/4 に近づく。よって <b>π ≒ 円内の点の数 ÷ 全体の点の数 × 4</b>。試行回数を増やすほど精度が上がる（<b>大数の法則</b>）。' },
    { h:'待ち行列と結果の解釈', p:'レジの行列は「客の<b>到着間隔</b>」と「1人あたりの<b>サービス時間</b>」が偶然に揺らぐ確率的モデルで表せる。シミュレーションで「レジを1台増やしたら平均待ち時間はどうなるか」を実験してから意思決定できる。ただし<b>結果はモデルの仮定に依存する</b>：仮定（到着のペース等）が現実とずれていれば結論もずれる。シミュレーション結果は「モデルの仮定のもとでは」という条件付きで解釈する。' },
  ],
  ex:[
    { q:'モンテカルロ法で円周率を推定する。正方形内に1,000個の点をランダムに打ったところ、四分円の内側に785個入った。円周率の推定値を求めよ。',
      s:'円内の割合 ＝ 785 ÷ 1000 ＝ 0.785。<br>これが π/4 の近似なので、π ≒ 0.785 × 4 ＝ <b>3.14</b>。<br>点の数を増やすほど（1万個、10万個…）推定値は安定してπに近づく。' },
  ],
  key:'モデルの2軸分類（<b>動的/静的 × 確率的/確定的</b>）で例を判定できるように。モンテカルロ法の円周率は<b>円内の割合×4</b>。結果は<b>仮定に依存</b>——限界の理解まで問われる。',
  quiz:[
    { q:'「天気によって来客数が変わる店の売上」を表すモデルの分類として適切なものは？', o:['確率的モデル','確定的モデル','物理モデル','静的モデル'], e:'天気・来客という偶然の要素を含むため確率的。毎回同じ結果になるのが確定的モデル。' },
    { q:'モンテカルロ法の説明として正しいものは？', o:['乱数を大量に使って近似解を求める手法','必ず厳密な解を求める手法','模型を実際に作って実験する手法','過去のデータを暗記させる手法'], e:'カジノの街モンテカルロが名前の由来。試行回数を増やすほど精度が上がる。' },
    { q:'正方形内に400個の点を打ち、四分円の内側に314個入った。円周率の推定値は？', o:['3.14','0.785','1.57','3.44'], e:'314÷400=0.785、0.785×4=3.14。' },
    { q:'シミュレーション結果を解釈するときの正しい姿勢は？', o:['モデルの仮定が現実と合っているかを踏まえて結論づける','コンピュータの計算なので現実と完全に一致するとみなす','試行回数は少ないほど正確だと考える','結果が予想と違ったらデータを修正する'], e:'モデルは単純化の産物。仮定の妥当性とセットで結果を評価する。' },
    { q:'レジの待ち行列シミュレーションで変化させる「パラメータ」にあたるものは？', o:['レジの台数や客の到着間隔','プログラミング言語の種類','画面の解像度','変数の名前'], e:'条件を表す数値がパラメータ。これを変えて比較実験することに意味がある。' },
  ]},
]},

{ name:'ネットワークとデータの活用', lessons:[

{ title:'ネットワークの仕組みとプロトコル',
  secs:[
    { h:'ネットワークの構成', p:'学校や家庭など限られた範囲のネットワークが<b>LAN</b>、LANどうしを広域に結ぶのが<b>WAN</b>。世界中のネットワークを相互接続したものが<b>インターネット</b>で、接続サービスを提供する事業者が<b>ISP（プロバイダ）</b>。無線LAN（<b>Wi-Fi</b>）ではアクセスポイントを識別する名前を<b>SSID</b>といい、通信はWPA2/WPA3などで<b>暗号化</b>する（暗号化なしの公衆Wi-Fiでの重要な通信は危険）。' },
    { h:'パケット交換方式', p:'電話のように回線を占有する<b>回線交換方式</b>に対し、インターネットはデータを<b>パケット</b>という小さな単位に分割して送る<b>パケット交換方式</b>を採る。各パケットには宛先などの<b>ヘッダ</b>が付く。利点：①回線を多数の通信で<b>共有</b>できて効率的、②一部のパケットが失われても<b>そのパケットだけ再送</b>すればよい、③経路の一部が壊れても別ルートで届けられる。' },
    { h:'TCP/IPの階層モデル', p:'インターネットの通信規約（<b>プロトコル</b>）は役割ごとに階層化されている。<div class="tbl-scroll"><table><tr><th>層</th><th>役割</th><th>プロトコル例</th></tr><tr><td><b>アプリケーション層</b></td><td>アプリごとの通信内容</td><td>HTTP、SMTP、DNS</td></tr><tr><td><b>トランスポート層</b></td><td>確実な配送の管理</td><td><b>TCP</b>、UDP</td></tr><tr><td><b>インターネット層</b></td><td>宛先までの経路・住所</td><td><b>IP</b></td></tr><tr><td>ネットワーク<br>インタフェース層</td><td>物理的な伝送</td><td>イーサネット、Wi-Fi</td></tr></table></div><b>TCP</b>は受け取り確認・<b>再送</b>・順序の復元で信頼性を保証する。<b>UDP</b>は確認を省いて速度優先（動画配信・通話向き）。役割分担により、各層を独立に改良できる。' },
    { h:'IPアドレスとルータ', p:'ネットワーク上の機器を識別する番号が<b>IPアドレス</b>。<b>IPv4は32ビット</b>で、8ビットずつ4つに区切り10進数で表す（例：192.168.1.1、各数は0〜255）。約43億個（2³²）では足りなくなったため、<b>128ビットのIPv6</b>への移行が進む。インターネット全体で一意な<b>グローバルIPアドレス</b>と、LAN内でのみ有効な<b>プライベートIPアドレス</b>がある。ネットワーク間でパケットの<b>経路を選択して転送</b>する装置が<b>ルータ</b>。機器に自動でIPアドレス等を割り当てるのが<b>DHCP</b>。ネットワーク機器に製造時から固有に付けられた番号は<b>MACアドレス</b>という。' },
    { h:'DNS：名前解決', p:'人間が覚えやすい<b>ドメイン名</b>（www.example.co.jp）と、機械が使うIPアドレスを対応づける仕組みが<b>DNS</b>。ドメイン名は右から階層構造（jp＝国、co＝組織種別、example＝組織名）。ブラウザにURLを入れると、まず<b>DNSサーバに問い合わせてIPアドレスを得て</b>（名前解決）、それからWebサーバに接続する——この2段階の流れは頻出。' },
  ],
  ex:[
    { q:'IPv4アドレスは32ビットである。理論上いくつのアドレスを表せるか。また「192.168.1.256」というIPv4アドレスはあり得るか。',
      s:'2³² ＝ <b>約43億個</b>（4,294,967,296個）。<br>各区切りは8ビット＝<b>0〜255</b>の範囲なので、<b>256を含むアドレスはあり得ない</b>。「区切りの数値が255以下か」はIPv4の見分け問題の定番。' },
  ],
  key:'TCP＝<b>信頼性</b>（確認・再送）、IP＝<b>経路と住所</b>。IPv4は<b>32ビット・各区切り0〜255</b>。DNS＝<b>名前解決</b>。この役割対応を即答できるように。',
  quiz:[
    { q:'TCPの役割として正しいものは？', o:['受信確認や再送によって通信の信頼性を保証する','ドメイン名をIPアドレスに変換する','パケットの経路を物理的に切り替える','Webページを画面に描画する'], e:'TCP=Transmission Control Protocol。確実に・正しい順序で届けるのが仕事。' },
    { q:'IPv4アドレスの長さは？', o:['32ビット','128ビット','64ビット','8ビット'], e:'32ビットを8ビット×4に区切って表記する。IPv6が128ビット。' },
    { q:'DHCPの役割は？', o:['ネットワークに接続した機器にIPアドレスなどを自動的に割り当てる','Webページを転送する','電子メールを送信する','通信を暗号化する'], e:'手動設定なしでネットにつながるのはDHCPのおかげ。' },
    { q:'ルータの役割として正しいものは？', o:['異なるネットワーク間でパケットの経路を選択して転送する','文字コードを変換する','コンピュータの電力を管理する','ファイルを圧縮する'], e:'経路選択（ルーティング）が名前の由来。インターネットはルータの網で結ばれている。' },
    { q:'パケット交換方式の利点として適切なものは？', o:['回線を複数の通信で共有でき、一部が失われても再送で対応できる','通信中は回線を占有できるので安定する','パケットに分割する処理が不要である','必ず同じ経路で届くため順序が保証される'], e:'占有しない・部分再送できる・経路を柔軟に選べるのが強み。順序の保証はTCPの仕事。' },
  ]},

{ title:'WWW・メールと通信速度の計算',
  secs:[
    { h:'URLの構造', p:'<code>https://www.example.co.jp/school/index.html</code> は、<b>スキーム</b>（https＝通信方法）＋<b>ドメイン名</b>（www.example.co.jp＝サーバの場所）＋<b>パス</b>（/school/index.html＝サーバ内のファイル位置）に分解できる。httpsの<b>s</b>は通信がTLSで<b>暗号化</b>されている印（鍵マーク）。' },
    { h:'Webが表示される仕組み', p:'ブラウザがWebサーバへ<b>HTTPリクエスト</b>を送り、サーバが<b>HTMLファイルなどをレスポンス</b>として返し、ブラウザがそれを解釈して描画する。HTMLは文書の構造、CSSは見た目、JavaScriptは動きを担当。<b>Cookie</b>＝サーバがブラウザに保存させる小さなデータで、ログイン状態の維持などに使われる（行動追跡にも使われるためプライバシーの論点になる）。' },
    { h:'電子メールの仕組み', p:'送信と転送は<b>SMTP</b>、受信は<b>POP</b>（メールを端末にダウンロードして管理）または<b>IMAP</b>（メールを<b>サーバ上に置いたまま</b>管理。複数端末で同期できる）。宛先の使い分け：<b>To</b>＝本来の宛先、<b>Cc</b>＝写し（全員にアドレスが見える）、<b>Bcc</b>＝<b>他の受信者にアドレスが見えない</b>写し。一斉送信で顧客アドレスをCcに入れて流出させる事故が典型例で、正解はBcc。' },
    { h:'通信速度の計算（頻出！）', p:'通信速度は<b>bps</b>（bits per second＝1秒あたりのビット数）。計算の3点セット：<ul><li><b>①単位をそろえる</b>：データ量がバイトなら<b>×8でビット</b>にする</li><li><b>②時間＝データ量÷速度</b></li><li><b>③伝送効率</b>：実際の速度＝理論値×効率（例：効率80%なら0.8倍）</li></ul>例：100MBのファイルを、100Mbpsの回線（効率100%）でダウンロード → 100×8＝800Mビット ÷ 100Mbps ＝ <b>8秒</b>。' },
  ],
  ex:[
    { q:'400Mbpsの回線を伝送効率80%で使い、100MBのファイルをダウンロードする。何秒かかるか。',
      s:'①データ量をビットへ：100MB × 8 ＝ 800Mビット。<br>②実効速度：400Mbps × 0.8 ＝ 320Mbps。<br>③時間 ＝ 800 ÷ 320 ＝ <b>2.5秒</b>。<br>「バイト→ビットの×8」と「効率をかける」の2つを忘れなければ確実に取れる問題。' },
  ],
  key:'通信計算は<b>「×8」「÷速度」「×効率」</b>の3手順を機械的に。メールは<b>SMTP（送）／POP・IMAP（受）</b>、Bcc＝<b>アドレス非公開</b>。',
  quiz:[
    { q:'Bccに指定した宛先の特徴は？', o:['他の受信者からそのアドレスが見えない','送信者にもアドレスが見えない','メール本文が暗号化される','返信ができなくなる'], e:'一斉送信で受信者同士のアドレスを隠すのに使う。Ccは全員に見える。' },
    { q:'IMAPがPOPと異なる点は？', o:['メールをサーバ上に置いたまま複数端末で同期して管理できる','メールを送信するためのプロトコルである','メールを暗号化して保存する','添付ファイルが使えない'], e:'スマホとPCで同じ受信箱が見えるのはIMAP的な管理。POPは端末にダウンロードする方式。' },
    { q:'60MBのファイルを240Mbpsの回線（効率100%）でダウンロードすると何秒かかるか？', o:['2秒','0.25秒','16秒','8秒'], e:'60MB×8=480Mビット÷240Mbps=2秒。バイト→ビットの変換を忘れずに。' },
    { q:'1Gbpsの回線を伝送効率40%で使うときの実効速度は？', o:['400Mbps','600Mbps','40Mbps','2.5Gbps'], e:'1Gbps=1000Mbps×0.4=400Mbps。効率は理論値に掛け算する。' },
    { q:'Cookieの主な用途として正しいものは？', o:['ログイン状態などをブラウザ側に保存して次回のアクセスに引き継ぐ','コンピュータウイルスを検出する','パケットの経路を決める','画像を圧縮する'], e:'状態のないHTTPを補って「続きから」を実現する仕組み。広告のための行動追跡にも使われる。' },
  ]},

{ title:'暗号化とセキュリティ技術',
  secs:[
    { h:'暗号の基本', p:'そのまま読める文が<b>平文</b>、変換後が<b>暗号文</b>。変換の手順が<b>アルゴリズム</b>で、その動きを決める秘密の値が<b>鍵</b>。古典的な<b>シーザー暗号</b>（文字を一定数ずらす。ずらす数が鍵）は総当たりで簡単に破られる——現代の暗号は「アルゴリズムは公開し、<b>鍵の秘密だけ</b>で安全性を保つ」のが原則。' },
    { h:'共通鍵暗号方式', p:'暗号化と復号に<b>同じ鍵</b>を使う方式（AESなど）。<b>処理が高速</b>な一方、①相手にどうやって安全に鍵を渡すかという<b>鍵配送問題</b>、②n人が互いに通信するには<b>n(n−1)/2個</b>の鍵が必要になる鍵管理の問題がある（10人なら45個）。' },
    { h:'公開鍵暗号方式', p:'各自が<b>公開鍵</b>（誰にでも配る）と<b>秘密鍵</b>（自分だけが持つ）のペアを作る。送信者は<b>受信者の公開鍵</b>で暗号化し、受信者だけが自分の<b>秘密鍵</b>で復号できる——鍵を事前に渡す必要がなく<b>鍵配送問題を解決</b>。必要な鍵はn人で<b>2n個</b>と少ない。弱点は<b>処理が遅い</b>こと。そこで実際の通信（<b>TLS/SSL</b>、httpsの中身）は、①公開鍵暗号で「共通鍵（セッション鍵）」を安全に共有し、②以後のデータ本体は高速な共通鍵暗号で送る<b>ハイブリッド方式</b>を使う。' },
    { h:'デジタル署名と電子証明書', p:'公開鍵暗号を逆向きに使うと「本人証明」ができる。送信者がデータの<b>ハッシュ値</b>（データを固定長に要約した値。少しでも改ざんされると大きく変わる一方向の値）を<b>自分の秘密鍵</b>で暗号化して添付＝<b>デジタル署名</b>。受信者は<b>送信者の公開鍵</b>で検証し、①本人が作成した（<b>なりすまし防止</b>）、②途中で変更されていない（<b>改ざん検出</b>）を確認できる。ただし「その公開鍵が本物か」という問題が残るため、<b>認証局（CA）</b>が<b>電子証明書</b>を発行して公開鍵の持ち主を保証する。ブラウザの鍵マークはこの仕組みの上に成り立っている。' },
    { h:'その他の防御技術', p:'<b>ファイアウォール</b>＝ネットワークの出入り口で通信を許可/遮断する仕組み。<b>VPN</b>＝公衆回線上に暗号化された仮想的な専用線を作る技術（外出先から社内ネットワークへ安全に接続）。無線LANの<b>WPA2/WPA3</b>暗号化、Webの<b>https化</b>とあわせて、複数の防御を重ねる（多層防御）のが基本。' },
  ],
  ex:[
    { q:'10人のグループ全員が互いに秘密に通信したい。（1）共通鍵暗号方式では鍵は何個必要か。（2）公開鍵暗号方式では何個か。',
      s:'（1）2人の組ごとに1個必要なので 10×9÷2 ＝ <b>45個</b>。<br>（2）各自が公開鍵と秘密鍵のペアを持てばよいので 10×2 ＝ <b>20個</b>。<br>人数が増えるほど差が開く（100人なら4,950個 vs 200個）。公開鍵暗号が「鍵管理」を劇的に楽にすることが分かる。' },
  ],
  key:'秘密のメッセージは<b>受信者の公開鍵</b>で暗号化、署名は<b>送信者の秘密鍵</b>で作る——「誰の・どちらの鍵か」を確実に。TLSは<b>ハイブリッド方式</b>。',
  quiz:[
    { q:'共通鍵暗号方式の「鍵配送問題」を解決した方式は？', o:['公開鍵暗号方式','シーザー暗号','パスワード認証','ハッシュ関数'], e:'公開鍵は盗聴されても構わない鍵なので、事前の安全な受け渡しが不要になる。' },
    { q:'AさんがBさんだけに読めるメッセージを送るとき、暗号化に使う鍵は？', o:['Bさんの公開鍵','Aさんの公開鍵','Aさんの秘密鍵','Bさんの秘密鍵'], e:'Bの公開鍵で暗号化すれば、対応するBの秘密鍵を持つB本人しか復号できない。' },
    { q:'デジタル署名を検証するときに使う鍵は？', o:['送信者の公開鍵','送信者の秘密鍵','受信者の公開鍵','受信者の秘密鍵'], e:'署名は送信者の秘密鍵で作られるので、対になる送信者の公開鍵で検証する。' },
    { q:'5人が共通鍵暗号方式で互いに通信するのに必要な鍵の数は？', o:['10個','5個','20個','25個'], e:'n(n−1)/2=5×4÷2=10個。公開鍵方式なら2n=10個…この人数では同数だが、人数が増えると差が開く。' },
    { q:'認証局（CA）の役割は？', o:['電子証明書を発行して公開鍵の持ち主が本物であることを保証する','通信速度を保証する','パスワードを保管する','ウイルスを駆除する'], e:'公開鍵のすり替え（中間者攻撃）を防ぐ信頼の起点。ブラウザの鍵マークの裏側にいる。' },
  ]},

{ title:'データベース',
  secs:[
    { h:'データベースとDBMS', p:'大量のデータを整理して蓄積し、複数の人やプログラムで共有する仕組みが<b>データベース</b>。それを管理するソフトウェアが<b>DBMS</b>（データベース管理システム）で、①複数人が同時に更新しても矛盾しないよう調整（<b>同時実行制御・排他制御</b>）、②障害からの<b>回復</b>、③アクセス権による<b>機密保護</b>などを担う。ATMの振込のように「口座Aから引く＋口座Bに足す」を<b>不可分のひとまとまり</b>として扱う仕組みが<b>トランザクション</b>——途中で障害が起きたら<b>全体を取り消して</b>、中途半端な状態を残さない。' },
    { h:'関係データベース（RDB）', p:'データを<b>表（テーブル）</b>で管理する最も普及した方式。行（<b>レコード</b>）が1件分、列（<b>フィールド</b>）が項目。<ul><li><b>主キー</b>：行を一意に識別する列。<b>重複してはいけない・空（NULL）でもいけない</b>（例：学籍番号。氏名は同姓同名がありうるので不適）</li><li><b>外部キー</b>：<b>他の表の主キーを参照</b>する列。表と表を関連づける</li></ul>' },
    { h:'表の操作とSQL', p:'RDBの基本操作は3つ。<b>選択</b>＝条件に合う<b>行</b>を取り出す、<b>射影</b>＝必要な<b>列</b>だけ取り出す、<b>結合</b>＝複数の表を共通の列でつなげる。操作には<b>SQL</b>という言語を使う：<code>SELECT 氏名 FROM 生徒 WHERE 学年 = 2</code>（生徒表から学年が2の行を選択し、氏名の列を射影）。' },
    { h:'データの重複を防ぐ：正規化', p:'1つの表に何でも詰め込むと、同じ情報（例：同じ生徒の氏名）が何行にも重複して現れ、変更時に<b>更新もれ・矛盾</b>が起こる。表を適切に分割して重複をなくす設計手続きが<b>正規化</b>。例：図書の貸出記録は「生徒表」「書籍表」「貸出表（学籍番号と書籍番号を外部キーで持つ）」に分ける。' },
    { h:'データの形式とオープンデータ', p:'データ交換によく使う形式：<b>CSV</b>（カンマ区切りの表、軽量）、<b>JSON</b>（<code>{"name": "mizuno", "age": 17}</code> のような階層構造、Web APIの標準）、<b>XML</b>（タグで構造を表す）。国や自治体が誰でも使える形で公開するデータを<b>オープンデータ</b>という。表形式に収まらないデータ向けの<b>NoSQL</b>データベースも普及している。' },
  ],
  ex:[
    { q:'図書室の貸出をExcelの1枚の表（貸出日・学籍番号・氏名・クラス・書籍番号・書名・著者）で管理していたら、同じ本を借りるたびに書名を打ち直し、クラス替えのときに大量の行を修正する必要が生じた。データベース設計としてどう改善すべきか。',
      s:'<b>正規化</b>する。「<b>生徒表</b>（学籍番号・氏名・クラス）」「<b>書籍表</b>（書籍番号・書名・著者）」「<b>貸出表</b>（貸出日・学籍番号・書籍番号）」の3表に分割し、貸出表は学籍番号と書籍番号を<b>外部キー</b>として持つ。クラス替えは生徒表の該当行を1か所直すだけで済み、書名の打ち直しも不要になる。<b>重複の排除→更新異常の防止</b>が正規化の目的。' },
  ],
  key:'主キー＝<b>重複なし・NULLなし</b>。選択（行）／射影（列）／結合（表をつなぐ）の対応は即答レベルに。正規化の目的は<b>重複と更新異常の防止</b>。',
  quiz:[

{ title:'データの分析',
  secs:[
    { h:'データの種類と尺度', p:'<div class="tbl-scroll"><table><tr><th>分類</th><th>尺度</th><th>意味</th><th>例</th></tr><tr><td rowspan="2"><b>質的データ</b></td><td><b>名義尺度</b></td><td>区別のみ（順序なし）</td><td>血液型、性別、出席番号</td></tr><tr><td><b>順序尺度</b></td><td>順序に意味あり（間隔は不定）</td><td>満足度（5段階）、順位</td></tr><tr><td rowspan="2"><b>量的データ</b></td><td><b>間隔尺度</b></td><td>間隔に意味（0は便宜的）</td><td>気温（℃）、西暦</td></tr><tr><td><b>比例尺度</b></td><td>比にも意味（0が本当のゼロ）</td><td>身長、金額、人数</td></tr></table></div>「気温30℃は15℃の2倍暑い」と言えないのは、℃が間隔尺度だから——尺度の判定問題は共通テスト頻出。' },
    { h:'収集と前処理', p:'分析の前に、<b>欠損値</b>（記入もれ。除外するか平均等で補完）、<b>外れ値</b>（他から極端に離れた値。誤記か真の値かを確認してから扱いを決める）、<b>表記ゆれ</b>（「東京都」と「東京」）を整える。この<b>データクレンジング</b>が分析の質を決める。単一項目の集計が<b>単純集計</b>、2項目を掛け合わせた表が<b>クロス集計</b>（例：学年×通学手段）。' },
    { h:'代表値とばらつき', p:'<b>平均値</b>＝合計÷個数。<b>中央値</b>＝大きさ順に並べた真ん中の値（<b>外れ値に強い</b>）。<b>最頻値</b>＝最も多く現れる値。年収のように一部の大きな値に引っ張られるデータでは平均値＞中央値となり、実感に近いのは中央値。ばらつきは<b>分散</b>（偏差＝各値−平均、の2乗の平均）と<b>標準偏差</b>（分散の正の平方根。元のデータと同じ単位に戻る）で測る。' },
    { h:'四分位数と箱ひげ図', p:'データを小さい順に並べ、4等分する位置の値が<b>四分位数</b>：Q1（下位25%）、Q2（＝中央値）、Q3（75%）。<b>四分位範囲 IQR＝Q3−Q1</b> は中央半分の広がりを表す。<b>箱ひげ図</b>は最小値・Q1・Q2・Q3・最大値を1つの図にしたもので、複数グループの分布の比較に便利。<b>Q1−1.5×IQRより小さい値、Q3＋1.5×IQRより大きい値を外れ値とみなす</b>基準がよく使われる。' },
    { h:'相関と回帰：関係を調べる', p:'2つの量的データの関係は<b>散布図</b>に描き、直線的な関係の強さを<b>相関係数r（−1〜＋1）</b>で測る。目安：|r|が0.7以上＝強い相関、0.4〜0.7＝中程度、0.2以下＝ほぼ無相関。関係が直線的なら<b>回帰直線 y＝ax＋b</b> を当てはめて予測に使える。<b>最重要の注意</b>：①<b>相関≠因果</b>——「アイスの売上」と「水難事故」の相関は、気温という<b>第3の変数</b>が両方を動かす<b>疑似相関</b>。②相関係数は<b>直線的な関係しか</b>測れない。③データの範囲外への予測（<b>外挿</b>）は当てにならない。' },
  ],
  ex:[
    { q:'5人の小テストの得点が 4, 5, 5, 6, 10 だった。平均値・中央値・最頻値・分散を求めよ。',
      s:'<b>平均値</b>＝(4+5+5+6+10)÷5＝30÷5＝<b>6</b>。<br><b>中央値</b>＝小さい順で3番目＝<b>5</b>。<br><b>最頻値</b>＝2回現れる<b>5</b>。<br><b>分散</b>＝偏差の2乗の平均＝{(4−6)²+(5−6)²+(5−6)²+(6−6)²+(10−6)²}÷5＝(4+1+1+0+16)÷5＝22÷5＝<b>4.4</b>。<br>10という高得点（外れ値ぎみ）が平均を押し上げ、平均値＞中央値になっている点にも注目。' },
  ],
  key:'尺度の4分類は例で判定できるように。<b>外れ値に強いのは中央値</b>。<b>相関≠因果</b>と<b>疑似相関（第3の変数）</b>は記述の選択肢問題で必ず狙われる。',
  quiz:[
    { q:'「血液型」はどの尺度に分類されるか？', o:['名義尺度','順序尺度','間隔尺度','比例尺度'], e:'A型・B型…は区別のみで順序も間隔もない。名義尺度。' },
    { q:'データ 2, 3, 5, 8, 100 の代表値として実態をよく表すものは？', o:['中央値','平均値','最大値','合計値'], e:'平均は(118÷5=)23.6と外れ値100に引っ張られる。中央値5のほうが「典型的な値」に近い。' },
    { q:'データ 3, 5, 7, 9, 6 の平均値は？', o:['6','5','7','6.5'], e:'合計30÷5=6。' },
    { q:'相関係数が0.9のとき、正しい解釈は？', o:['強い正の相関があるが、因果関係があるとは限らない','一方が他方の原因であることが証明された','ほとんど関係がない','強い負の相関がある'], e:'0.9は強い正の相関。しかし相関はあくまで「一緒に動く」ことしか示さない。' },
    { q:'回帰直線 y＝2x＋10 が得られた。x＝15 のときのyの予測値は？', o:['40','30','25','50'], e:'2×15+10=40。ただしxの観測範囲を大きく外れた外挿は信頼できない点も忘れずに。' },
  ]},
]},
]},

/* =========================================================
   アプリ本体
========================================================= */
const LS_KEY = 'mizuno-elearn-v2';
const app = document.getElementById('app');
let progress = {};
try { progress = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch (e) { progress = {}; }
function save() { localStorage.setItem(LS_KEY, JSON.stringify(progress)); }

function lessonId(ci, ui, li) { return `${COURSES[ci].id}-${ui}-${li}`; }
function courseLessons(c) { return c.units.reduce((a, u) => a + u.lessons.length, 0); }
function courseDone(ci) {
  let n = 0;
  COURSES[ci].units.forEach((u, ui) => u.lessons.forEach((_, li) => { if (progress[lessonId(ci, ui, li)]?.done) n++; }));
  return n;
}
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ===== ホーム画面 ===== */
function renderHome() {
  let html = `
    <h1>🎓 <span class="g">情報Ⅰ・Ⅱ eラーニング</span></h1>
    <p class="lead">教科書レベルの解説＋例題＋演習で、単元ごとに着実に。演習の3分の2以上正解でレッスン完了。</p>`;
  COURSES.forEach((c, ci) => {
    const total = courseLessons(c), done = courseDone(ci);
    const pct = total ? Math.round(done / total * 100) : 0;
    html += `
    <div class="box">
      <div class="course-head">
        <span class="course-badge ${c.badge}">${c.name}</span>
        <h2>${c.name === '情報Ⅰ' ? '必履修科目・共通テスト対応' : '発展科目（選択）'}</h2>
      </div>
      <p class="course-sub">${c.desc}</p>
      <div class="pbar ${c.pbar}"><i style="width:${pct}%"></i></div>
      <div class="ptext">${done} / ${total} レッスン完了（${pct}%）</div>
      ${c.units.map((u, ui) => {
        const uDone = u.lessons.filter((_, li) => progress[lessonId(ci, ui, li)]?.done).length;
        return `
        <div class="unit" id="unit-${ci}-${ui}">
          <button class="unit-h" data-u="${ci}-${ui}">
            <span class="no">${ui + 1}</span>
            <span class="nm">${u.name}</span>
            <span class="st">${uDone}/${u.lessons.length}</span>
            <span class="caret">▶</span>
          </button>
          <div class="unit-body">
            ${u.lessons.map((l, li) => {
              const p = progress[lessonId(ci, ui, li)];
              return `<a class="lesson-link ${p?.done ? 'done' : ''}" href="#l/${ci}/${ui}/${li}">
                <span class="mark">${p?.done ? '✓' : ''}</span>
                <span class="ttl">${l.title}</span>
                ${p ? `<span class="sc">${p.best}/${l.quiz.length}</span>` : ''}
              </a>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  });
  html += `<div class="reset-row"><button class="reset-btn" id="resetBtn">学習記録をリセット</button></div>`;
  app.innerHTML = html;
  app.querySelectorAll('.unit-h').forEach(b => b.addEventListener('click', () => {
    document.getElementById('unit-' + b.dataset.u).classList.toggle('open');
  }));
  // 最初の未完了単元を開く
  outer:
  for (let ci = 0; ci < COURSES.length; ci++) {
    for (let ui = 0; ui < COURSES[ci].units.length; ui++) {
      const u = COURSES[ci].units[ui];
      if (!u.lessons.every((_, li) => progress[lessonId(ci, ui, li)]?.done)) {
        document.getElementById(`unit-${ci}-${ui}`).classList.add('open');
        break outer;
      }
    }
  }
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('学習記録をすべて消去します。よろしいですか？')) {
      progress = {}; save(); renderHome();
    }
  });
}

/* ===== レッスン画面 ===== */
function renderLesson(ci, ui, li) {
  const c = COURSES[ci], u = c.units[ui], l = u.lessons[li];
  const id = lessonId(ci, ui, li);
  // 選択肢シャッフル
  const qs = l.quiz.map(q => {
    const order = shuffle([...q.o.keys()]);
    return { q: q.q, e: q.e, o: order.map(i => q.o[i]), a: order.indexOf(0) };
  });
  let answered = 0, correct = 0;

  app.innerHTML = `
    <div class="crumb"><a href="#home">🏠 ホーム</a> ／ ${c.name} ／ 第${ui + 1}単元 ${u.name}</div>
    <div class="box">
      <div class="l-title">${l.title}</div>
      ${l.secs.map(s => `<div class="sec"><h3>${s.h}</h3><p>${s.p}</p></div>`).join('')}
      ${(l.ex || []).map((x, xi) => `
        <div class="exbox" id="ex-${xi}">
          <div class="ex-q">${x.q}</div>
          <button class="ex-toggle" data-x="${xi}">▼ 解答・解説を見る</button>
          <div class="ex-s">${x.s}</div>
        </div>`).join('')}
      <div class="keybox">${l.key}</div>
      <div class="check-h">✏️ 理解度チェック</div>
      <div class="check-sub">${qs.length}問中${Math.ceil(qs.length * 2 / 3)}問以上の正解でレッスン完了！</div>
      ${qs.map((q, qi) => `
        <div class="cq" data-qi="${qi}">
          <div class="qt"><span class="qno">Q${qi + 1}.</span>${q.q}</div>
          <div class="opts">
            ${q.o.map((o, oi) => `<button class="opt" data-oi="${oi}"><span class="k">${'ABCD'[oi]}</span><span>${o}</span></button>`).join('')}
          </div>
          <div class="exp">${q.e}</div>
        </div>`).join('')}
      <div class="verdict" id="verdict"></div>
      <div class="nav-row" id="navRow">
        <a class="nbtn" href="#home">単元一覧へ</a>
      </div>
    </div>`;

  app.querySelectorAll('.ex-toggle').forEach(b => b.addEventListener('click', () => {
    const box = document.getElementById('ex-' + b.dataset.x);
    box.classList.toggle('open');
    b.textContent = box.classList.contains('open') ? '▲ 解答・解説を閉じる' : '▼ 解答・解説を見る';
  }));

  app.querySelectorAll('.cq').forEach(cqEl => {
    const qi = +cqEl.dataset.qi, q = qs[qi];
    cqEl.querySelectorAll('.opt').forEach(btn => btn.addEventListener('click', () => {
      const oi = +btn.dataset.oi;
      cqEl.querySelectorAll('.opt').forEach(b => b.disabled = true);
      if (oi === q.a) {
        correct++;
        btn.classList.add('correct');
        cqEl.querySelectorAll('.opt').forEach(b => { if (+b.dataset.oi !== oi) b.classList.add('dim'); });
      } else {
        btn.classList.add('wrong');
        cqEl.querySelectorAll('.opt').forEach(b => {
          if (+b.dataset.oi === q.a) b.classList.add('correct');
          else if (+b.dataset.oi !== oi) b.classList.add('dim');
        });
      }
      cqEl.querySelector('.exp').classList.add('show');
      answered++;
      if (answered === qs.length) finish();
    }));
  });

  function finish() {
    const need = Math.ceil(qs.length * 2 / 3);
    const pass = correct >= need;
    const prev = progress[id];
    progress[id] = { done: pass || !!prev?.done, best: Math.max(correct, prev?.best || 0) };
    save();
    document.getElementById('verdict').innerHTML = pass
      ? `<span class="pass">🎉 ${correct}/${qs.length}問正解 — レッスン完了！</span>`
      : `<span class="fail">${correct}/${qs.length}問正解 — もう一度解説を読んで再挑戦しよう</span>`;
    // 次のレッスンへ
    const nav = document.getElementById('navRow');
    let next = null;
    if (li + 1 < u.lessons.length) next = [ci, ui, li + 1];
    else if (ui + 1 < c.units.length) next = [ci, ui + 1, 0];
    else if (ci + 1 < COURSES.length) next = [ci + 1, 0, 0];
    if (!pass) {
      const rb = document.createElement('button');
      rb.className = 'nbtn primary'; rb.textContent = '🔄 このレッスンに再挑戦';
      rb.addEventListener('click', () => renderLesson(ci, ui, li));
      nav.appendChild(rb);
    } else if (next) {
      const a = document.createElement('a');
      a.className = 'nbtn primary'; a.href = `#l/${next[0]}/${next[1]}/${next[2]}`;
      a.textContent = '次のレッスンへ →';
      nav.appendChild(a);
    } else {
      const s = document.createElement('span');
      s.className = 'nbtn primary'; s.textContent = '🏆 全レッスン制覇！';
      nav.appendChild(s);
    }
    document.getElementById('verdict').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  window.scrollTo(0, 0);
}

/* ===== ルーティング ===== */
function route() {
  const h = location.hash;
  const m = h.match(/^#l\/(\d+)\/(\d+)\/(\d+)$/);
  if (m) {
    const [ci, ui, li] = [+m[1], +m[2], +m[3]];
    if (COURSES[ci]?.units[ui]?.lessons[li]) { renderLesson(ci, ui, li); return; }
  }
  renderHome();
}
window.addEventListener('hashchange', route);
route();
</script>
