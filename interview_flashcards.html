<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>面接練習カード — 神戸市特別選考</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12212F;
    --bg-2: #0C1821;
    --paper: #FBF7EE;
    --paper-shadow: #E4DCC8;
    --ink: #1D2A32;
    --ink-soft: #55636B;
    --gold: #C9962C;
    --gold-soft: #E7C878;
    --tier-s: #B33951;
    --tier-a: #C9962C;
    --tier-b: #3F7269;
    --tier-c: #7C8B96;
    --line: rgba(251,247,238,0.14);
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; }
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% -10%, rgba(201,150,44,0.14), transparent 45%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--paper);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 20px 14px 40px;
  }

  .ticket-header{
    width:100%;
    max-width:460px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom: 1px dashed var(--line);
  }
  .ticket-header .label{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.14em;
    color: var(--gold-soft);
    text-transform:uppercase;
  }
  .ticket-header h1{
    font-family:'Shippori Mincho', serif;
    font-size:17px;
    font-weight:700;
    margin:2px 0 0;
    color:var(--paper);
    letter-spacing:0.02em;
  }
  .seat-no{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    background:var(--paper);
    padding:5px 9px;
    border-radius:3px;
    letter-spacing:0.06em;
    box-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }

  .filters{
    width:100%;
    max-width:460px;
    display:flex;
    gap:6px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .chip{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.03em;
    padding:7px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(251,247,238,0.04);
    color: var(--paper);
    cursor:pointer;
    transition: all .15s ease;
  }
  .chip.active{
    background: var(--gold);
    color:#241505;
    border-color: var(--gold);
    font-weight:700;
  }
  .chip .count{ opacity:0.7; margin-left:3px; }

  .progress-row{
    width:100%;
    max-width:460px;
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color: var(--ink-soft);
  }
  .progress-track{
    flex:1;
    height:5px;
    background:rgba(251,247,238,0.1);
    border-radius:99px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background: linear-gradient(90deg, var(--gold-soft), var(--gold));
    border-radius:99px;
    transition: width .3s ease;
  }

  .stage{
    width:100%;
    max-width:460px;
    position:relative;
    height:400px;
    perspective: 1400px;
  }
  .card{
    position:absolute;
    inset:0;
    border-radius:16px;
    cursor:pointer;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.2,.8,.2,1);
  }
  .card.flipped{ transform: rotateY(180deg); }
  .face{
    position:absolute;
    inset:0;
    backface-visibility: hidden;
    border-radius:16px;
    background: var(--paper);
    color: var(--ink);
    box-shadow: 0 18px 40px rgba(0,0,0,0.35), 0 2px 0 var(--paper-shadow);
    padding:26px 24px 22px;
    display:flex;
    flex-direction:column;
  }
  .face.back{ transform: rotateY(180deg); }

  .stub-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-bottom:12px;
    margin-bottom:16px;
    border-bottom: 1px dashed var(--paper-shadow);
  }
  .qnum{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color: var(--ink-soft);
    letter-spacing:0.05em;
  }
  .tier-badge{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:5px;
    color:#fff;
    letter-spacing:0.05em;
  }
  .tier-S{ background: var(--tier-s); }
  .tier-A{ background: var(--tier-a); color:#241505; }
  .tier-B{ background: var(--tier-b); }
  .tier-C{ background: var(--tier-c); }

  .q-text{
    font-family:'Shippori Mincho', serif;
    font-size:21px;
    line-height:1.6;
    font-weight:700;
    flex:1;
    display:flex;
    align-items:center;
  }
  .tap-hint{
    text-align:center;
    font-size:11px;
    color: var(--ink-soft);
    font-family:'JetBrains Mono', monospace;
    letter-spacing:0.05em;
  }

  .a-title{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.1em;
    color: var(--gold);
    text-transform:uppercase;
    margin-bottom:10px;
    font-weight:700;
  }
  .a-list{
    flex:1;
    overflow-y:auto;
    margin:0;
    padding-left:18px;
    font-size:14.5px;
    line-height:1.75;
    color: var(--ink);
  }
  .a-list li{ margin-bottom:6px; }

  .controls{
    width:100%;
    max-width:460px;
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  .btn{
    flex:1;
    padding:14px 8px;
    border-radius:12px;
    border:none;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    font-size:14.5px;
    cursor:pointer;
    transition: transform .1s ease, opacity .15s ease;
  }
  .btn:active{ transform: scale(0.96); }
  .btn-again{
    background: rgba(251,247,238,0.08);
    color: var(--paper);
    border: 1px solid var(--line);
  }
  .btn-know{
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    color: #241505;
  }
  .btn:disabled{ opacity:0.35; cursor:default; }

  .nav-row{
    width:100%;
    max-width:460px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:12px;
  }
  .nav-btn{
    background:none;
    border:none;
    color: var(--ink-soft);
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    padding:8px 4px;
    cursor:pointer;
  }
  .nav-btn.reset{ color: #E4A5AF; }

  .done-screen{
    width:100%;
    max-width:460px;
    text-align:center;
    padding: 60px 20px;
    font-family:'Shippori Mincho', serif;
  }
  .done-screen .big{ font-size:22px; font-weight:700; margin-bottom:8px; }
  .done-screen .small{ font-family:'Zen Kaku Gothic New', sans-serif; font-size:13px; color: var(--ink-soft); }

  @media (max-width:380px){
    .stage{ height:380px; }
    .q-text{ font-size:19px; }
  }
</style>
</head>
<body>

  <div class="ticket-header">
    <div>
      <div class="label">面接想定問答 — 練習カード</div>

    </div>
    <div class="seat-no">受験番号 94003</div>
  </div>

  <div class="progress-row">
    <span id="progress-label">0 / 0</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <span id="progress-pct">0%</span>
  </div>

  <div class="stage" id="stage"></div>

  <div class="controls" id="controls" style="display:none;">
    <button class="btn btn-again" id="btn-again">もう一度</button>
    <button class="btn btn-know" id="btn-know">分かった</button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="btn-shuffle">🔀 シャッフル</button>
    <button class="nav-btn reset" id="btn-reset">進捗をリセット</button>
  </div>

const STORAGE_KEY = 'interview-flashcards-known-v1';
let known = new Set();
let queue = [];
let activeTier = 'ALL';
let currentIndex = 0;
let isFlipped = false;

const tierLabel = {ALL:'すべて', S:'S', A:'A', B:'B', C:'C'};
const tierOrder = ['ALL','S','A','B','C'];

async function loadKnown(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      known = new Set(JSON.parse(res.value));
    }
  }catch(e){ known = new Set(); }
}

async function saveKnown(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify([...known]), false);
  }catch(e){ /* best effort */ }
}

function tierCount(tier){
  if(tier==='ALL') return CARDS.length;
  return CARDS.filter(c=>c.tier===tier).length;
}
function tierRemaining(tier){
  const list = tier==='ALL' ? CARDS : CARDS.filter(c=>c.tier===tier);
  return list.filter(c=>!known.has(c.id)).length;
}

function buildQueue(){
  let list = activeTier==='ALL' ? CARDS.slice() : CARDS.filter(c=>c.tier===activeTier);
  queue = list.filter(c=>!known.has(c.id));
  currentIndex = 0;
  isFlipped = false;
}

function renderFilters(){
  const el = document.getElementById('filters');
  el.innerHTML = '';
  tierOrder.forEach(t=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (t===activeTier ? ' active':'');
    chip.innerHTML = tierLabel[t] + '<span class="count">' + tierRemaining(t) + '/' + tierCount(t) + '</span>';
    chip.onclick = ()=>{ activeTier = t; buildQueue(); renderAll(); };
    el.appendChild(chip);
  });
}

function renderProgress(){
  const total = activeTier==='ALL' ? CARDS.length : tierCount(activeTier);
  const remaining = queue.length;
  const doneCount = total - remaining;
  const pct = total ? Math.round((doneCount/total)*100) : 0;
  document.getElementById('progress-label').textContent = doneCount + ' / ' + total;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderStage(){
  const stage = document.getElementById('stage');
  const controls = document.getElementById('controls');
  if(queue.length===0){
    controls.style.display = 'none';
    stage.innerHTML = '<div class="done-screen"><div class="big">🎌 このセットは終了</div><div class="small">お疲れさま。別のタグを選ぶか、リセットしてもう一周どうぞ。</div></div>';
    return;
  }
  controls.style.display = 'flex';
  const card = queue[currentIndex];
  stage.innerHTML = `
    <div class="card ${isFlipped ? 'flipped':''}" id="flip-card">
      <div class="face front">
        <div class="stub-row">
          <span class="qnum">Q${String(card.id).padStart(2,'0')} / 34</span>
          <span class="tier-badge tier-${card.tier}">TIER ${card.tier}</span>
        </div>
        <div class="q-text">${card.q}</div>
        <div class="tap-hint">タップして回答のポイントを見る ▸</div>
      </div>
      <div class="face back">
        <div class="stub-row">
          <span class="qnum">Q${String(card.id).padStart(2,'0')} / 34</span>
          <span class="tier-badge tier-${card.tier}">TIER ${card.tier}</span>
        </div>
        <div class="a-title">回答のポイント</div>
        <ul class="a-list">${card.a.map(x=>'<li>'+x+'</li>').join('')}</ul>
      </div>
    </div>
  `;
  document.getElementById('flip-card').onclick = ()=>{
    isFlipped = !isFlipped;
    document.getElementById('flip-card').classList.toggle('flipped', isFlipped);
  };
}

function renderAll(){
  renderFilters();
  renderProgress();
  renderStage();
}

function nextCard(){
  isFlipped = false;
  if(queue.length===0){ renderAll(); return; }
  currentIndex = currentIndex % queue.length;
  renderAll();
}

document.getElementById('btn-know').onclick = async ()=>{
  if(queue.length===0) return;
  const card = queue[currentIndex];
  known.add(card.id);
  await saveKnown();
  queue.splice(currentIndex,1);
  if(currentIndex >= queue.length) currentIndex = 0;
  nextCard();
};

document.getElementById('btn-again').onclick = ()=>{
  if(queue.length===0) return;
  const card = queue.splice(currentIndex,1)[0];
  queue.push(card);
  if(currentIndex >= queue.length) currentIndex = 0;
  nextCard();
};

document.getElementById('btn-shuffle').onclick = ()=>{
  for(let i=queue.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [queue[i],queue[j]] = [queue[j],queue[i]];
  }
  currentIndex = 0;
  nextCard();
};

document.getElementById('btn-reset').onclick = async ()=>{
  known.clear();
  await saveKnown();
  buildQueue();
  renderAll();
};

(async function init(){
  await loadKnown();
  buildQueue();
  renderAll();
})();
</script>
</body>
</html>
