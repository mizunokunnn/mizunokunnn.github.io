/* ---------------- サウンド (Web Audio) ---------------- */
let AC = null;
function ac(){
  if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(AC){
    if(AC.state==='suspended') AC.resume();
    if(typeof BGM!=='undefined' && BGM.want && !BGM.cur && typeof playBGM==='function') playBGM(BGM.want);
  }
  return AC;
}
function beep(freq, dur=0.07, type='square', vol=0.05, when=0){
  const a = ac(); if(!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, a.currentTime+when);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+when+dur);
  o.connect(g); g.connect(a.destination);
  o.start(a.currentTime+when); o.stop(a.currentTime+when+dur+0.02);
}

const expToNext = lv => lv*lv*6;
function makeChar(id){
  const d = CHARDEF[id], b = d.base;
  return {id, n:d.n, e:d.e, lv:1, exp:0, next:expToNext(1),
          hp:b.hp, mhp:b.hp, thp:b.hp, pp:b.pp, mpp:b.pp,
          atk:b.atk, def:b.def, spd:b.spd};
}
function psiList(c, fieldOnly){
  return Object.entries(PSI).filter(([k,p]) =>
    p.who===c.id && c.lv>=p.lv && (!fieldOnly || p.type==='heal'||p.type==='healA'));
}

/* ---------------- セーブ ---------------- */
/* セーブ先の自動判定:
   - Claudeアプリ/Claude.ai内 → window.storage (アカウントに紐づくクラウド保存)
   - Safari等の単体ブラウザ   → localStorage (端末内保存) にフォールバック */
function hasWS(){ try{ return !!(window.storage && window.storage.set); }catch(e){ return false; } }
async function saveGame(){
  const data = JSON.stringify(S);
  try{
    if(hasWS()){ const r = await window.storage.set('em_save', data); return !!r; }
    localStorage.setItem('em_save', data); return true;
  }catch(e){ return false; }
}
async function loadGame(){
  try{
    let raw = null;
    if(hasWS()){ const r = await window.storage.get('em_save'); raw = r && r.value; }
    else raw = localStorage.getItem('em_save');
    const sv = raw ? JSON.parse(raw) : null;
    if(sv && sv.party) sv.party.forEach(c=>{ if(CHARDEF[c.id]){ c.n = CHARDEF[c.id].n; c.e = CHARDEF[c.id].e; } if(c.thp===undefined) c.thp = c.hp; });
    return sv;
  }catch(e){ return null; }
}

const held = {up:0,down:0,left:0,right:0};
let aHandlers = [];
function onceA(fn){ aHandlers.push(fn); }
function fireA(){ const h = aHandlers.splice(0); h.forEach(f=>f()); }
function bindHold(id, key){
  const el = $(id);
  const on  = e=>{e.preventDefault(); held[key]=1; el.classList.add('on');};
  const off = e=>{e.preventDefault(); held[key]=0; el.classList.remove('on');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off); el.addEventListener('touchcancel',off);
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
}
bindHold('d-up','up'); bindHold('d-down','down'); bindHold('d-left','left'); bindHold('d-right','right');

}

/* ---------------- カーソルナビ（十字キー＋A/Bで全UI操作） ---------------- */
let NAV = null;
function navVisible(el){ if(!el || !el.isConnected) return false;
  const r = el.getBoundingClientRect(); return r.width>0 && r.height>0; }
function navStale(){ return NAV && !navVisible(NAV.els[NAV.idx]); }
function navSet(els, opts={}){
  navClear();
  els = [...els];
  if(!els.length) return;
  NAV = { els, idx:Math.min(opts.idx||0, els.length-1), cols:opts.cols||1, onCancel:opts.onCancel||null };
  navPaint();
}
function navPaint(){ NAV.els.forEach((el,i)=>el.classList.toggle('nav', i===NAV.idx)); }
function navClear(){ if(NAV) NAV.els.forEach(el=>el.classList.remove('nav')); NAV = null; }
function navMove(dx, dy){
  if(!NAV) return false;
  if(navStale()){ navClear(); return false; }
  const n = NAV.els.length;
  NAV.idx = (((NAV.idx + dx + dy*NAV.cols) % n) + n) % n;
  navPaint(); SE.move(); return true;
}
function navPick(){
  if(!NAV) return false;
  if(navStale()){ navClear(); return false; }
  const el = NAV.els[NAV.idx]; navClear();
  el.dispatchEvent(new MouseEvent('mousedown', {cancelable:true, bubbles:false}));
  return true;
}
function navCancel(){
  if(!NAV) return false;
  if(navStale()){ navClear(); return false; }
  if(!NAV.onCancel) return false;
  const f = NAV.onCancel; navClear(); SE.ok(); f(); return true;
}
setInterval(()=>{
  if(!NAV) return;
  if(held.up){ navMove(0,-1); held.up=0; }
  else if(held.down){ navMove(0,1); held.down=0; }
  else if(held.left){ navMove(-1,0); held.left=0; }
  else if(held.right){ navMove(1,0); held.right=0; }
}, 90);
window.addEventListener('keydown',e=>{
  if(e.repeat) return;
  if(e.key==='ArrowUp')held.up=1; if(e.key==='ArrowDown')held.down=1;
  if(e.key==='ArrowLeft')held.left=1; if(e.key==='ArrowRight')held.right=1;
  if(e.key==='z'||e.key===' '||e.key==='Enter'){ac(); if(e.repeat) return; if(!navPick()){ fireA(); aDown = true; }}
  if(e.key==='x'||e.key==='Escape'){ac(); if(!navCancel()) onB();}
  if(e.key==='x'||e.key==='Escape'){ac(); onB();}
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowUp')held.up=0; if(e.key==='ArrowDown')held.down=0;
  if(e.key==='ArrowLeft')held.left=0; if(e.key==='ArrowRight')held.right=0;
});
$('dialog').addEventListener('touchstart',e=>{e.preventDefault(); fireA();},{passive:false});
$('dialog').addEventListener('mousedown',e=>{e.preventDefault(); fireA();});

/* ---------------- 会話システム ---------------- */
let busy = false;
function waitA(){ return new Promise(res=>onceA(res)); }
const sleep = ms => new Promise(r=>setTimeout(r,ms));
async function typeText(el, html){
  el.innerHTML = '';
  const tmp = document.createElement('div'); tmp.innerHTML = html;
  const full = html;
  let i = 0, done = false, plain = tmp.textContent;
  // 1文字ずつ(タグはまとめて)
  const reveal = async()=>{
    let out = '', n = 0, target = 0;
    while(!done){
      target++;
      // htmlを安全に部分表示: タグはスキップして一括
      let shown = '', cnt = 0, j = 0;
      while(j < full.length && cnt < target){
        if(full[j] === '<'){ const k = full.indexOf('>', j); shown += full.slice(j, k+1); j = k+1; }
        else { shown += full[j]; j++; cnt++; }
      }
      el.innerHTML = shown;
      if(cnt >= plain.length){ done = true; break; }
      await sleep(22);
    }
    el.innerHTML = full;
  };
  let skip = false;
  onceA(()=>{ skip = true; done = true; });
  await reveal();
  if(!skip) return; // すでに全表示
}
async function dialog(lines){
  busy = true;
  const box = $('dialog'), txt = $('dtext');
  box.style.display = 'block';
  for(const line of lines){
    SE.ok();
    await typeText(txt, line);
    txt.innerHTML = line;
    await waitA();
  }
  box.style.display = 'none';
  busy = false;
  aDown = false;
  talkCool = performance.now() + 300; // 会話直後の再トークを防ぐ
}
function say(name, text){ return `<span class="name">${name}</span><br>${text}`; }
async function choice(opts){
  busy = true;
  const c = $('choices'); c.innerHTML = ''; c.style.display = 'block';
  let sel = 0;
  const rows = opts.map((o,i)=>{
    const d = document.createElement('div'); d.textContent = o;
    d.addEventListener('touchstart',e=>{e.preventDefault(); sel=i; upd(); pick();},{passive:false});
    d.addEventListener('mousedown',e=>{e.preventDefault(); sel=i; upd(); pick();});
    c.appendChild(d); return d;
  });
  const upd = ()=>rows.forEach((r,i)=>r.classList.toggle('sel', i===sel));
  upd();
  let resolve; const p = new Promise(r=>resolve=r);
  let alive = true;
  const pick = ()=>{ if(!alive) return; alive=false; SE.ok(); c.style.display='none'; busy=false; resolve(sel); };
  const keyloop = setInterval(()=>{
    if(!alive){ clearInterval(keyloop); return; }
    if(held.up){ sel=(sel+opts.length-1)%opts.length; upd(); held.up=0; }
    if(held.down){ sel=(sel+1)%opts.length; upd(); held.down=0; }
  }, 80);
  onceA(()=>{}); // 直前のA残り消化
  const arm = ()=>onceA(()=>{ if(alive) pick(); else arm(); });
  setTimeout(arm, 100);
  return p;
}

/* ---------------- ショップ ---------------- */
async function shop(stock, keeper){
  await dialog([say(keeper,'いらっしゃい！ なにに する？')]);
  while(true){
    const opts = stock.map(k=>`${ITEMS[k].n} ${ITEMS[k].price}えん`).concat(['やめる']);
    const sel = await choice(opts);
    if(sel === stock.length){ await dialog([say(keeper,'まいど！ きをつけてな。')]); return; }
    const k = stock[sel], it = ITEMS[k];
    await dialog([`${it.n}：${it.d}`]);
    const ok = await choice(['かう','やめとく']);
    if(ok===0){
      if(S.money < it.price){ await dialog([say(keeper,'おかね たりてへんで？')]); continue; }
      S.money -= it.price; S.inv[k] = (S.inv[k]||0)+1; SE.heal();
      await dialog([`${it.n}を てにいれた！`]);
    }
  }
}

/* ---------------- レベルアップ ---------------- */
function levelUp(c, silent){
  const g = CHARDEF[c.id].grow;
  c.lv++; c.next = expToNext(c.lv);
  c.mhp += g.hp; c.mpp = Math.round(c.mpp + g.pp);
  c.atk = +(c.atk + g.atk).toFixed(1); c.def = +(c.def + g.def).toFixed(1); c.spd = +(c.spd + g.spd).toFixed(1);
  c.mhp = Math.round(c.mhp);
  c.hp = Math.min(c.mhp, c.hp + g.hp); c.pp = Math.min(c.mpp, c.pp + g.pp);
  c.thp = c.hp;
  if(!silent) SE.lvup();
}

const SPRC = {};
function buildSprite(id, key, flip){
  const d = PIX[id], rows = d[key];
  const cv = document.createElement('canvas'); cv.width = 32; cv.height = 32;
  const c = cv.getContext('2d');
  for(let y=0;y<16;y++) for(let x=0;x<16;x++){
    const ch = rows[y][flip ? 15-x : x];
    const col = d.pal[ch];
    if(col){ c.fillStyle = col; c.fillRect(x*2, y*2, 2, 2); }
  }
  return cv;
}
function spr(id, dir, step){
  if(!PIX[id]) return null;
  let key = (dir==='left'||dir==='right') ? 'side' : dir;
  let flip = (dir==='right');
  if((dir==='up'||dir==='down') && step) flip = !flip;   // 足の左右で歩き表現
  const ck = id+'_'+key+'_'+(flip?1:0);
  return SPRC[ck] || (SPRC[ck] = buildSprite(id, key, flip));
}
function sprIcon(id){
  const cv = spr(id, 'down', false);
  return cv ? `<img class="spi" src="${cv.toDataURL()}" alt="">` : '';
}

const FSPR = {};
function buildFoe(key){
  const d = FOEPIX[key]; if(!d) return null;
  const cv = document.createElement('canvas'); cv.width = 64; cv.height = 64;
  const c = cv.getContext('2d');
  for(let y=0;y<16;y++){ const row = d.rows[y]; for(let x=0;x<16;x++){
    const col = d.pal[row[x]];
    if(col){ c.fillStyle = col; c.fillRect(x*4, y*4, 4, 4); }
  }}
  return cv;
}
function foeIcon(key){
  if(!FOEPIX[key]) return '';
  const cv = FSPR[key] || (FSPR[key] = buildFoe(key));
  return cv ? `<img class="ficon" src="${cv.toDataURL()}" alt="">` : '';
}

/* ---------------- NPCのドット絵（人間ジェネレータ＋オブジェクト） ---------------- */
function humanPix(o){
  const g = Array.from({length:16},()=>Array(16).fill('.'));
  const set=(x1,y1,x2,y2,ch)=>{for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++)g[y][x]=ch;};
  // かみ
  set(3,1,12,3,'H');
  set(3,4,3,6,'H'); set(12,4,12,6,'H');
  if(o.long){ set(2,2,3,9,'H'); set(12,2,13,9,'H'); }
  if(o.bald){ set(3,1,12,2,'.'); set(4,2,11,3,'S'); set(3,3,3,3,'H'); set(12,3,12,3,'H'); }
  if(o.spiky){ g[0][4]='H'; g[0][7]='H'; g[0][10]='H'; g[0][12]='H'; }
  // かお
  set(4,4,11,7,'S');
  if(o.shades){ set(4,5,11,5,'K'); g[6][4]='K'; g[6][11]='K'; }
  else { g[5][5]='K'; g[5][10]='K'; }
  // ぼうし(かみの上から)
  if(o.hat){ set(3,0,12,1,'A'); set(2,2,13,2,'A'); }
  // からだ
  if(o.dress){
    set(4,8,11,11,'P');
    set(3,9,3,10,'S'); set(12,9,12,10,'S');
    set(3,12,12,12,'P'); set(2,13,13,13,'P');
    set(5,14,6,14,'S'); set(9,14,10,14,'S');
    set(5,15,6,15,'Q'); set(9,15,10,15,'Q');
  } else {
    set(4,8,11,10,'P');
    set(3,9,3,10,'S'); set(12,9,12,10,'S');
    set(4,11,11,12,'Z');
    set(4,13,6,13,'Z'); set(9,13,11,13,'Z');
    set(5,14,6,14,'S'); set(9,14,10,14,'S');
    set(4,15,6,15,'Q'); set(9,15,11,15,'Q');
  }
  if(o.apron) set(6,9,9,12,'W');
  return { pal:{H:o.hair||'#3a2a14',S:o.skin||'#f8c89c',K:'#1a1a1a',P:o.top||'#c05050',
                Z:o.bottom||'#3a5aa8',Q:o.shoes||'#5a3a20',W:'#f4f4f4',A:o.hatC||'#d83434'},
           rows:g.map(r=>r.join('')) };
}

const NPCIMG = {};
function npcImg(n){
  if(NPCIMG[n.name]!==undefined) return NPCIMG[n.name];
  const d = npcSpec(n);
  if(!d) return NPCIMG[n.name]=null;
  const cv = document.createElement('canvas'); cv.width=32; cv.height=32;
  const c = cv.getContext('2d');
  for(let y=0;y<16;y++)for(let x=0;x<16;x++){
    const col = d.pal[d.rows[y][x]];
    if(col){ c.fillStyle=col; c.fillRect(x*2,y*2,2,2); }
  }
  return NPCIMG[n.name]=cv;
}
function tileAt(m, x, y){
  if(y<0||y>=m.grid.length||x<0||x>=m.grid[0].length) return '#';
  return m.grid[y][x];
}
function npcAt(x, y){
  return NPCS.find(n=>n.map===S.map && n.x===x && n.y===y && !(n.hide && n.hide(F())));
}
function walkable(m, x, y){
  const t = tileAt(m, x, y);
  if(t==='#'||SOLID.has(t)) return false;
  if(npcAt(x,y)) return false;
  return true;
}
let moveAnim = null; // {fx,fy,tx,ty,t0}
function draw(){
  frame++;
  const m = MAPS[S.map];
  const W = m.grid[0].length, H = m.grid.length;
  // カメラ
  let px = S.x, py = S.y;
  if(moveAnim){
    const k = Math.min(1,(performance.now()-moveAnim.t0)/150);
    px = moveAnim.fx + (moveAnim.tx-moveAnim.fx)*k;
    py = moveAnim.fy + (moveAnim.ty-moveAnim.fy)*k;
  }
  let cx = px - VW/2 + .5, cy = py - VH/2 + .5;
  cx = Math.max(0, Math.min(W-VW, cx)); cy = Math.max(0, Math.min(H-VH, cy));
  if(W<=VW) cx = (W-VW)/2; if(H<=VH) cy = (H-VH)/2;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,320,288);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const x0 = Math.floor(cx), y0 = Math.floor(cy);
  for(let ty=y0; ty<=y0+VH; ty++){
    for(let tx=x0; tx<=x0+VW; tx++){
      const t = tileAt(m,tx,ty); if(t==='#') continue;
      const sx = (tx-cx)*TS, sy = (ty-cy)*TS;
      let col = TILE_C[t]||'#000';
      if(t==='~') col = (Math.floor(frame/30)+tx+ty)%2 ? '#4a9ce8' : '#3e8cd8';
      if(t==='n') col = `hsl(${270+20*Math.sin(frame/40+tx+ty)},45%,${18+4*Math.sin(frame/25+tx*2)}%)`;
      ctx.fillStyle = col; ctx.fillRect(sx,sy,TS+1,TS+1);
      if(t==='.'&&(tx*7+ty*13)%9===0){ ctx.fillStyle='rgba(0,0,0,.07)'; ctx.fillRect(sx+10,sy+10,4,4); }
      if(t==='b'&&(tx*5+ty*11)%7===0){ ctx.fillStyle='rgba(0,0,0,.08)'; ctx.fillRect(sx+14,sy+16,3,3); }
      if(t==='C'&&(tx+ty)%5===0){ ctx.fillStyle='rgba(255,255,255,.05)'; ctx.fillRect(sx+8,sy+8,3,3); }
      if(t==='R'){ ctx.fillStyle='rgba(0,0,0,.15)'; ctx.fillRect(sx,sy+TS-6,TS+1,6); }
      // かべ・やね・みず・どうくつ の質感
      if(t==='W'){ ctx.fillStyle='rgba(0,0,0,.12)';
        for(let yy=8;yy<TS;yy+=12) ctx.fillRect(sx,sy+yy,TS,2);
        ctx.fillRect(sx+(ty%2?8:20), sy, 2, TS); }
      if(t==='R'){ ctx.fillStyle='rgba(0,0,0,.18)';
        for(let yy=6;yy<TS;yy+=8) ctx.fillRect(sx,sy+yy,TS,2); }
      if(t==='~'){ ctx.fillStyle='rgba(255,255,255,.25)';
        const wv = Math.floor(frame/20+tx+ty)%4;
        if(wv===0) ctx.fillRect(sx+6,sy+10,12,2);
        if(wv===2) ctx.fillRect(sx+14,sy+22,10,2); }
      if(t==='c'){ ctx.fillStyle='rgba(0,0,0,.25)';
        if((tx*3+ty*7)%4===0) ctx.fillRect(sx+4,sy+4,10,8);
        if((tx*5+ty*3)%4===1) ctx.fillRect(sx+18,sy+18,10,8); }
      const ti = tileImg(t);
      if(ti){ ctx.imageSmoothingEnabled=false; ctx.drawImage(ti, sx, sy); }
    }
  }
  // NPC
  ctx.font = '26px serif';
  ctx.imageSmoothingEnabled = false;
  for(const n of NPCS){
    if(n.map!==S.map || (n.hide&&n.hide(F()))) continue;
    const sx=(n.x-cx)*TS, sy=(n.y-cy)*TS;
    if(sx<-TS||sy<-TS||sx>320||sy>288) continue;
    const im = npcImg(n);
    if(im){
      const fl = (n.name==='ほしのこえ') ? Math.sin(frame/18)*3 : 0;
      ctx.drawImage(im, Math.round(sx), Math.round(sy)-4+fl);
    } else ctx.fillText(n.e, sx+TS/2, sy+TS/2+2);
  }
  // 徘徊する敵シンボル（ドット絵）
  ctx.imageSmoothingEnabled = false;
  for(const r of roamers){
    const sx=(r.x-cx)*TS, sy=(r.y-cy)*TS;
    if(sx<-TS||sy<-TS||sx>320||sy>288) continue;
    const bob = Math.sin(frame/9 + r.x*1.3 + r.y)*2;
    const weak = isWeakRoamer(r);
    // 影
    ctx.globalAlpha = weak ? 0.18 : 0.28;
    ctx.fillStyle='#000'; ctx.beginPath();
    ctx.ellipse(sx+TS/2, sy+TS-3, 9, 3, 0, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
    // ドット絵本体（弱い敵は うすく）
    const sp = FOEPIX[r.ek] ? (FSPR[r.ek] || (FSPR[r.ek]=buildFoe(r.ek))) : null;
    ctx.globalAlpha = weak ? 0.5 : 1;
    if(sp){
      ctx.drawImage(sp, Math.round(sx), Math.round(sy)-5+bob, TS, TS);
    } else {
      ctx.font='24px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(r.e, sx+TS/2, sy+TS/2+2+bob);
    }
    ctx.globalAlpha = 1;
  }
  ctx.font = '26px serif';
  ctx.imageSmoothingEnabled = false;
  const k = moveAnim ? Math.min(1,(performance.now()-moveAnim.t0)/150) : 1;
  const step = moveAnim ? Math.floor(frame/8)%2===1 : false;
  for(let i=S.party.length-1; i>=1; i--){
    const to = S.trail[i-1], from = S.trail[i] || to;
    if(!to) continue;
    const fx = from.x + (to.x-from.x)*k, fy = from.y + (to.y-from.y)*k;
    const sx=(fx-cx)*TS, sy=(fy-cy)*TS;
    // 向き：いまの位置→目的地（とまってたら主人公のほうを見る）
    const ahead = (i===1) ? {x:S.x,y:S.y} : S.trail[i-2];
    let fdir = 'down';
    if(ahead){
      const dx = ahead.x-to.x, dy = ahead.y-to.y;
      if(Math.abs(dx)>Math.abs(dy)) fdir = dx>0?'right':'left';
      else if(dy!==0) fdir = dy>0?'down':'up';
    }
    const im = spr(S.party[i].id, fdir, step);
    if(im) ctx.drawImage(im, Math.round(sx), Math.round(sy)-4);
    else ctx.fillText(S.party[i].e, sx+TS/2, sy+TS/2+2);
  }
  // 主人公
  {
    const sx=(px-cx)*TS, sy=(py-cy)*TS;
    const im = spr(S.party[0].id, S.dir, step);
    if(im) ctx.drawImage(im, Math.round(sx), Math.round(sy)-4);
    else { ctx.font='27px serif'; ctx.fillText(S.party[0].e, sx+TS/2, sy+TS/2+2); }
  }
  // HUD
  $('hud').innerHTML = `♪×${mc()}　${S.money}えん<br><span style="color:#9ab">${m.name}</span>`;
}

/* ---------------- ワープ ---------------- */
async function fadeWarp(map, x, y){
  playBGM(mapTrack(map));
  S.map = map; S.x = x; S.y = y;
  S.trail = [{x,y},{x,y}];
  moveAnim = null;
  SE.move();
  spawnRoamers();
}

/* ---------------- 移動と更新 ---------------- */
const DIRV = {up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
const OPP = {up:'down',down:'up',left:'right',right:'left'};

/* === シンボルエンカウント（徘徊する敵シンボル） === */
let roamers = [];          // {x,y,dir,group,e,ek}
let lastRoamMap = null;    // マップが変わったら再配置
let battleActive = false;  // バトル中はシンボル停止
function dirFromTo(ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay;
  if(Math.abs(dx)>=Math.abs(dy)) return dx>0?'right':(dx<0?'left':(dy>0?'down':'up'));
  return dy>0?'down':'up';
}
function foeTier(group){ // グループの強さ目安
  let mx = 0; group.forEach(k=>{ const f=FOES[k]; if(f && !f.boss) mx = Math.max(mx, f.exp); });
  return Math.max(1, Math.round(mx/4)); // exp4→1, exp8→2, exp24→6…
}
function isWeakRoamer(r){
  // 主人公レベルが グループの強さ＋4 以上 なら「よわい敵」＝逃げる/瞬殺
  return S.party[0] && (S.party[0].lv >= foeTier(r.group)+4);
}
function roamerAt(x,y,except){ return roamers.find(r=>r!==except && r.x===x && r.y===y); }
function spawnRoamers(){
  roamers = [];
  const m = MAPS[S.map], enc = m.enc;
  if(!enc || (enc.off && enc.off(F())) || m.indoor) return;
  const count = 3 + Math.floor(Math.random()*2); // 3〜4体
  let tries = 0;
  while(roamers.length < count && tries < 400){
    tries++;
    const x = 1 + Math.floor(Math.random()*(m.grid[0].length-2));
    const y = 1 + Math.floor(Math.random()*(m.grid.length-2));
    if(!walkable(m,x,y) || roamerAt(x,y)) continue;
    if(Math.abs(x-S.x)+Math.abs(y-S.y) < 4) continue; // 主人公の近くには湧かない
    const group = enc.groups[Math.floor(Math.random()*enc.groups.length)];
    const lead = FOES[group[0]];
    roamers.push({x, y, dir:'down', group, e:lead.e, ek:group[0]});
  }
}
function moveRoamers(){
  if(mode!=='field' || busy || battleActive || !S || moveAnim) return;
  const m = MAPS[S.map];
  for(const r of roamers){
    const weak = isWeakRoamer(r);
    const dist = Math.abs(r.x-S.x)+Math.abs(r.y-S.y);
    let order;
    if(weak){ // 主人公から にげる
      const away = OPP[dirFromTo(r.x,r.y,S.x,S.y)];
      order = [away, ...shuffle(['up','down','left','right'])];
    } else if(dist<=5 && Math.random()<0.55){ // 近いと追ってくる
      order = [dirFromTo(r.x,r.y,S.x,S.y), ...shuffle(['up','down','left','right'])];
    } else {
      order = shuffle(['up','down','left','right']);
    }
    for(const d of order){
      const [dx,dy]=DIRV[d]; const nx=r.x+dx, ny=r.y+dy;
      if(nx===S.x && ny===S.y){ // 主人公に接触（敵から突っ込んだ）
        r.dir = d;
        const enemyFirst = (d === S.dir); // 主人公の背後から来た＝不意打ち
        triggerSymbol(r, weak, enemyFirst ? 'enemy' : null);
        return;
      }
      if(walkable(m,nx,ny) && !roamerAt(nx,ny,r)){ r.x=nx; r.y=ny; r.dir=d; break; }
    }
  }
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
async function triggerSymbol(r, weak, first){
  const idx = roamers.indexOf(r); if(idx>=0) roamers.splice(idx,1);
  if(weak){ // よわい敵は たたかわずに 逃げる/瞬殺
    busy = true;
    toast('よわい てきは あわてて にげていった！');
    SE.ok(); await sleep(900); hideToast(); busy = false;
    scheduleRespawn();
    return;
  }
  await battle(r.group, {first, symbol:true});
  scheduleRespawn();
}
function scheduleRespawn(){
  const m = MAPS[S.map], enc = m.enc;
  if(!enc || (enc.off && enc.off(F())) || m.indoor) return;
  setTimeout(()=>{
    if(mode!=='field' || m!==MAPS[S.map]) return;
    if(roamers.length >= 4) return;
    const W=m.grid[0].length, H=m.grid.length;
    for(let t=0;t<60;t++){
      // 画面外ぎみ＆主人公から離れた場所に1体だけ補充
      const x=1+Math.floor(Math.random()*(W-2)), y=1+Math.floor(Math.random()*(H-2));
      if(walkable(m,x,y) && !roamerAt(x,y) && Math.abs(x-S.x)+Math.abs(y-S.y)>6){
        const group = enc.groups[Math.floor(Math.random()*enc.groups.length)];
        roamers.push({x,y,dir:'down',group,e:FOES[group[0]].e,ek:group[0]});
        break;
      }
    }
  }, 5000 + Math.random()*4000);
}
/* トースト（フィールド用の小メッセージ） */
function toast(msg){ const t=$('toast'); t.innerHTML=msg; t.style.display='block'; }
function hideToast(){ $('toast').style.display='none'; }

async function stepDone(){
  S.steps++;
  const m = MAPS[S.map];
  // ドア
  const d = m.doors.find(d=>d.x===S.x && d.y===S.y);
  if(d){ await fadeWarp(d.to, d.tx, d.ty); return; }
  // シンボル接触（主人公が敵シンボルに乗った）
  const r = roamerAt(S.x, S.y);
  if(r){
    const weak = isWeakRoamer(r);
    const playerFirst = (S.dir === r.dir); // 敵の背後を突いた＝先制
    await triggerSymbol(r, weak, weak ? null : (playerFirst ? 'player' : null));
  }
}
function tryMove(dir){
  if(moveAnim || busy) return;
  S.dir = dir;
  const [dx,dy] = DIRV[dir];
  const m = MAPS[S.map];
  const nx = S.x+dx, ny = S.y+dy;
  const W = m.grid[0].length, H = m.grid.length;
  // 端から出る → 出口チェック
  if(nx<0||ny<0||nx>=W||ny>=H){
    const ex = m.exits.find(e=>
      (e.side==='n'&&ny<0&&S.x>=e.min&&S.x<=e.max) ||
      (e.side==='s'&&ny>=H&&S.x>=e.min&&S.x<=e.max) ||
      (e.side==='w'&&nx<0&&S.y>=e.min&&S.y<=e.max) ||
      (e.side==='e'&&nx>=W&&S.y>=e.min&&S.y<=e.max));
    if(ex){
      const tm = MAPS[ex.to];
      let tx = ex.tx, ty = ex.ty;
      if(ex.keepX) tx = Math.min(tm.grid[0].length-2, Math.max(1, S.x));
      if(ex.side==='n') ty = tm.grid.length-2;
      if(ex.side==='s') ty = 1;
      if(ex.side==='w') tx = tm.grid[0].length-2;
      if(ex.side==='e') tx = 1;
      if(ex.tx!==undefined && !ex.keepX && (ex.side==='w'||ex.side==='e')) ty = ex.ty;
      fadeWarp(ex.to, tx, ty);
    }
    return;
  }
  if(!walkable(m,nx,ny)) return;
  // しっぽ更新
  S.trail.unshift({x:S.x, y:S.y});
  if(S.trail.length>4) S.trail.pop();
  moveAnim = {fx:S.x, fy:S.y, tx:nx, ty:ny, t0:performance.now()};
  S.x = nx; S.y = ny;
}
function tryInteract(){
  const [dx,dy] = DIRV[S.dir];
  const n = npcAt(S.x+dx, S.y+dy) || npcAt(S.x, S.y);
  if(n && n.talk){ SE.ok(); n.talk(); }
}

let menuOpen = false;
function onB(){
  if(busy){ return; }
  if(menuOpen){ closeMenu(); return; }
  if(!S || mode!=='field') return;
  openMenu();
}
function closeMenu(){ menuOpen=false; busy=false; $('menu').style.display='none'; $('subwin').style.display='none'; }
function navMenu(idx){

}
function openMenu(){
  menuOpen = true; busy = true; SE.ok();
  const mn = $('menu'); mn.innerHTML=''; mn.style.display='block';
  const items = ['つよさ','どうぐ','サイ','メロディ','セーブ','パスワード','とじる'];
  items.forEach((label, li)=>{
    const d = document.createElement('div'); d.textContent = label;
    const h = async e=>{
      e.preventDefault();
      SE.ok();
      if(label==='とじる'){ closeMenu(); return; }
      if(label==='つよさ'){ showStatus(); navMenu(li); }
      if(label==='どうぐ') await menuItems(li);
      if(label==='サイ') await menuPsi(li);
      if(label==='メロディ'){ playMelody(mc()||0); showSub(`<b>♪ メロディ ${mc()} / 8</b><br>`+
        [['m1','いんせきのうた'],['m2','もりのうた'],['m3','まちのうた'],['m4','みずのうた'],
         ['m5','うみのうた'],['m6','ひかりのうた'],['m7','ゆめのうた'],['m8','かぞくのうた']]
        .map(([k,n],i)=>`${F()[k]?'♪':'・'} ${F()[k]?n:'？？？'}`).join('<br>')); navMenu(li); }
      if(label==='セーブ'){ const ok = await saveGame(); showSub(ok?'<b>セーブしました！</b>':'セーブできませんでした…'); navMenu(li); }
      if(label==='パスワード') await menuPassword(li);
    };
    d.addEventListener('touchstart',h,{passive:false}); d.addEventListener('mousedown',h);
    mn.appendChild(d);
  });
  navMenu(0);
}
function showSub(html){ const s=$('subwin'); s.classList.remove('statwin'); s.innerHTML=html; s.style.display='block'; }
function showStatus(){
  const s = $('subwin');
  s.innerHTML = S.party.map(c=>
    `<b>${c.e}${c.n}</b> Lv.${c.lv}　<span class="hp" style="color:#8f8">HP ${Math.round(c.hp)}/${c.mhp}</span> <span style="color:#8cf">PP ${Math.round(c.pp)}/${c.mpp}</span><br>こうげき${Math.round(c.atk)}　ぼうぎょ${Math.round(c.def)}　はやさ${Math.round(c.spd)}　つぎ${Math.max(0,c.next-c.exp)}`
  ).join('<hr style="border-color:#345">');
  s.classList.add('statwin');

function decodeCode(raw){
  try{
    let s = raw.replace(/\s+/g,'');
    if(s.startsWith('EM1-')) s = s.slice(4);
    const json = decodeURIComponent(escape(atob(s)));
    const sv = JSON.parse(json);
    if(!sv || !Array.isArray(sv.party) || !sv.party.length) return null;
    // 整合性のバックフィル
    sv.party.forEach(c=>{
      if(CHARDEF[c.id]){ c.n = CHARDEF[c.id].n; c.e = CHARDEF[c.id].e; }
      if(c.thp===undefined) c.thp = c.hp;
      c.poison = 0; c.sleep = 0; c._faint = false;
    });
    if(!sv.flags) sv.flags = {};
    if(!sv.inv) sv.inv = {};
    if(!sv.trail) sv.trail = [];
    if(sv.dir===undefined) sv.dir = 'down';
    if(!sv.map || !MAPS[sv.map]) sv.map = 'home';
    return sv;
  }catch(e){ return null; }
}

    if(it.full){ c.thp=c.mhp; c.pp=c.mpp; }
    if(it.heal && !c._faint) c.thp = Math.min(c.mhp, c.thp+it.heal);

    if(it.pp) c.pp = Math.min(c.mpp, c.pp+it.pp);

const rnd = (a,b)=>a+Math.random()*(b-a);
let LAST_CRIT = false;
function physDmg(atk, def, mult=1){
  let d = (atk*2*mult - def*1.1) * rnd(0.85,1.15);
  LAST_CRIT = Math.random()<0.0625;
  if(LAST_CRIT) d*=1.8;
  return Math.max(1, Math.round(d));
}

let hpRoll = null, rollActive = -1;
function startHPRoll(){
  if(hpRoll) return;
  hpRoll = setInterval(()=>{
    let changed=false, tick=false;
    for(const c of S.party){
      const tgt = Math.round(c.thp);
      if(Math.round(c.hp) === tgt) { c.hp = tgt; continue; }
      const diff = tgt - c.hp;
      const stepMag = Math.max(1, Math.ceil(Math.abs(diff)/7));
      c.hp += Math.sign(diff)*Math.min(stepMag, Math.abs(diff));
      if(c.hp<0) c.hp=0;
      if(c.hp>c.mhp) c.hp=c.mhp;
      changed=true; tick=true;
    }
    if(tick) SE.tick();
    if(changed) renderPartyCards(rollActive);
  }, 55);
}
function stopHPRoll(){ if(hpRoll){ clearInterval(hpRoll); hpRoll=null; } }
function rollSettled(){ return S.party.every(c=>Math.round(c.hp)===Math.round(c.thp)); }

  }

}

function nf(t){
  const m = t.match(/^([A-G])(#?)(\d)$/); if(!m) return 0;
  const base = {C:0,D:2,E:4,F:5,G:7,A:9,B:11}[m[1]] + (m[2]?1:0);
  return 440*Math.pow(2,((+m[3]+1)*12+base-69)/12);
}

const BGM = { cur:null, want:null, timer:null, next:0, step:0, paused:false };
let NOISEBUF = null;
function noiseBuf(){
  if(NOISEBUF || !AC) return NOISEBUF;
  const b = AC.createBuffer(1, AC.sampleRate*0.05, AC.sampleRate);
  const d = b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
  return NOISEBUF = b;
}
function bgmTone(freq, t, dur, type, vol){
  if(!AC || !freq) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t+0.015);
  g.gain.setValueAtTime(vol, t+dur*0.6);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+dur+0.02);
}
function bgmTick(t){
  if(!AC) return;
  const src = AC.createBufferSource(), g = AC.createGain();
  src.buffer = noiseBuf(); g.gain.value = 0.018;
  src.connect(g); g.connect(AC.destination); src.start(t);
}
function holdLen(arr, i){
  let n = 1;
  while(arr[(i+n)%arr.length]==='-' && n<arr.length) n++;
  return n;
}
function bgmStep(){
  const tr = TRACKS[BGM.cur]; if(!tr) return;
  const spb = 60/tr.bpm/2; // 8分音符
  const i = BGM.step % tr.L.length, j = BGM.step % tr.B.length;
  const ln = tr.L[i], bn = tr.B[j];
  if(ln!=='-'&&ln!=='.') bgmTone(nf(ln), BGM.next, spb*holdLen(tr.L,i)*0.92, 'square', 0.028);
  if(bn!=='-'&&bn!=='.') bgmTone(nf(bn), BGM.next, spb*holdLen(tr.B,j)*0.95, 'triangle', 0.05);
  if(tr.perc && BGM.step%2===0) bgmTick(BGM.next);
  BGM.next += spb; BGM.step++;
}
function bgmSchedule(){
  if(!AC || !BGM.cur || BGM.paused) return;
  while(BGM.next < AC.currentTime + 0.15) bgmStep();
}
function playBGM(name){
  BGM.want = name;
  if(!AC) return;
  if(BGM.cur === name && !BGM.paused) return;
  BGM.paused = false;
  BGM.cur = name; BGM.step = 0; BGM.next = AC.currentTime + 0.06;
  if(!BGM.timer) BGM.timer = setInterval(bgmSchedule, 60);
}
function stopBGM(){ BGM.cur = null; }
function pauseBGM(ms){
  BGM.paused = true;
  setTimeout(()=>{ BGM.paused = false; if(BGM.want){ BGM.cur=null; playBGM(BGM.want); } }, ms);
}
function mapTrack(map){
  if(map==='cave') return 'cave';
  if(map==='noise') return 'noise';
  if(map==='home'||map==='town'||map==='shop1'||map==='shop2') return 'town';
  return 'field';
}

/* ---------------- 起動 ---------------- */
/* PWA: サーバ上に sw.js を置けば 完全オフライン化。
   file:// 単体や sw.js が無い環境では 静かに失敗するだけ（ゲームには影響なし）。
   このHTMLは外部依存が フォント以外ゼロ（フォントもフォールバックあり）なので、
   iOSは「ホーム画面に追加」で 電波なしでも起動できる。 */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* 未ホスト時は無視 */ });
  });
}
function boot(){
  showTitle();
  loop();
}
boot();
